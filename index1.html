<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 【移动端适配】增强视口配置：禁用缩放/双击/页面溢出，viewport-fit=cover适配全面屏 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>3D 地铁跑酷 - Subway Surfer</title>
    <style>
        :root {
            --yellow: #FFD700;
            --blue: #1E90FF;
            --red: #FF4444;
            --bg: #1a1a2e;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            /* 【移动端适配·BUG修复】全局禁止所有非按钮区域的触摸交互 */
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: none;
            overscroll-behavior: none;
            -webkit-user-drag: none;
            position: fixed;
            top: 0;
            left: 0;
            /* 禁止双击缩放 */
            -ms-touch-action: manipulation;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        #game-container canvas {
            pointer-events: auto;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        /* UI 覆盖层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #ui-layer>* {
            pointer-events: auto;
        }

        /* 开始界面 */
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 20, 0.85);
            z-index: 200;
            transition: opacity 0.3s;
            /* ★ BUG修复A：确保菜单层自身可接收触摸事件 */
            pointer-events: auto !important;
            touch-action: manipulation;
        }
        #menu-screen.hidden {
            opacity: 0;
            pointer-events: none !important;
        }
        /* ★ BUG修复A/B：首页三个按钮提升到最高层级，确保无任何元素遮挡触摸 */
        #menu-screen .btn,
        #menu-screen .btn-sm {
            position: relative;
            z-index: 210 !important;
            pointer-events: auto !important;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            /* 消除300ms延迟 */
        }
        #menu-screen .title {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 900;
            color: var(--yellow);
            text-shadow: 3px 3px 0 #e07b00, 6px 6px 0 rgba(0, 0, 0, 0.4);
            letter-spacing: 0.05em;
            margin-bottom: 0.3em;
            text-align: center;
        }
        #menu-screen .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: #ccc;
            margin-bottom: 1.5em;
            letter-spacing: 0.1em;
        }
        #menu-screen .btn {
            display: inline-block;
            padding: clamp(14px, 2.5vh, 20px) clamp(40px, 8vw, 70px);
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: #1a1a2e;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-play {
            background: var(--yellow);
            margin-bottom: 1em;
        }
        .btn-play:hover {
            background: #ffe44d;
            transform: scale(1.05);
            box-shadow: 0 8px 28px rgba(255, 215, 0, 0.5);
        }
        .btn-play:active {
            transform: scale(0.95);
        }
        /* ★ BUG修复A：触摸按下视觉反馈（亮色光晕），确认touch事件正常触发 */
        .btn-touch-press {
            transform: scale(0.92) !important;
            filter: brightness(1.4);
            transition: transform 0.08s, filter 0.08s;
            box-shadow: 0 0 24px rgba(255, 215, 0, 0.8) !important;
        }
        #menu-screen .controls-info {
            color: #aaa;
            font-size: clamp(0.75rem, 1.5vw, 0.95rem);
            text-align: center;
            line-height: 1.8;
            margin-top: 0.5em;
        }
        #menu-screen .high-score {
            color: var(--yellow);
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            margin-top: 0.8em;
            font-weight: 600;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: clamp(8px, 1.5vh, 16px) clamp(12px, 3vw, 24px);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #hud.hidden {
            opacity: 0;
        }
        #hud>* {
            pointer-events: auto;
        }
        .hud-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .hud-score {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }
        .hud-combo {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            font-weight: 700;
            color: var(--yellow);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            transition: transform 0.15s;
        }
        .hud-distance {
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            color: #ccc;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        .hud-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        .powerup-slots {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .powerup-slot {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: clamp(0.7rem, 1.3vw, 0.85rem);
            color: #fff;
            min-width: 90px;
            transition: opacity 0.3s;
        }
        .powerup-slot .icon {
            font-size: 1.2em;
        }
        .powerup-slot .bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            overflow: hidden;
            min-width: 40px;
        }
        .powerup-slot .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .bar-magnet {
            background: #4dc9f6;
        }
        .bar-double {
            background: #ffd700;
        }
        .bar-jetpack {
            background: #ff6b6b;
        }
        .bar-skate {
            background: #51cf66;
        }
        .btn-volume {
            width: clamp(32px, 5vw, 40px);
            height: clamp(32px, 5vw, 40px);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: clamp(1rem, 2vw, 1.3rem);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .btn-volume:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .btn-pause {
            width: clamp(32px, 5vw, 40px);
            height: clamp(32px, 5vw, 40px);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: clamp(1rem, 2vw, 1.3rem);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .btn-pause:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 暂停 & 结束覆盖层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            transition: opacity 0.3s;
            /* ★ BUG修复C：确保结算弹窗在最顶层，触摸事件不被任何元素拦截 */
            pointer-events: auto !important;
            touch-action: manipulation;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none !important;
        }
        /* ★ BUG修复C：结算弹窗内按钮确保高z-index可触摸 */
        #gameover-overlay {
            z-index: 500 !important;
        }
        #gameover-overlay .btn {
            z-index: 501;
            position: relative;
            pointer-events: auto !important;
            touch-action: manipulation;
        }
        #pause-overlay .btn {
            z-index: 301;
            position: relative;
            pointer-events: auto !important;
            touch-action: manipulation;
        }
        .overlay .big-text {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.6);
            margin-bottom: 0.3em;
            text-align: center;
        }
        .overlay .big-text.red {
            color: var(--red);
        }
        .overlay .score-text {
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            color: #fff;
            margin: 0.3em 0;
        }
        .overlay .record-text {
            font-size: clamp(1rem, 2vw, 1.4rem);
            color: var(--yellow);
            font-weight: 700;
            animation: pulse 0.6s infinite alternate;
        }
        @keyframes pulse {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.08);
            }
        }
        .overlay .btn {
            padding: clamp(10px, 2vh, 16px) clamp(30px, 6vw, 55px);
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin: 0.4em;
            letter-spacing: 0.04em;
            transition: transform 0.15s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            color: #1a1a2e;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-resume {
            background: #4ecb71;
        }
        .btn-resume:hover {
            background: #5de682;
            transform: scale(1.05);
        }
        .btn-resume:active {
            transform: scale(0.95);
        }
        .btn-restart {
            background: var(--yellow);
        }
        .btn-restart:hover {
            background: #ffe44d;
            transform: scale(1.05);
        }
        .btn-restart:active {
            transform: scale(0.95);
        }
        .btn-menu {
            background: #888;
            color: #fff;
        }
        .btn-menu:hover {
            background: #aaa;
            transform: scale(1.05);
        }
        .btn-menu:active {
            transform: scale(0.95);
        }

        /* 浮动文字 */
        .float-text {
            position: absolute;
            pointer-events: none;
            font-weight: 800;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: var(--yellow);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 55;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            60% {
                opacity: 0.8;
                transform: translateY(-40px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-70px) scale(0.8);
            }
        }

        /* 移动端底部提示 */
        #mobile-hint {
            position: absolute;
            bottom: clamp(20px, 4vh, 40px);
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(0.7rem, 1.4vw, 0.85rem);
            text-align: center;
            pointer-events: none;
            z-index: 45;
            transition: opacity 0.5s;
        }
        @media (min-width: 769px) {
            #mobile-hint {
                opacity: 0.35;
            }
        }
        @media (max-width: 768px) {
            #mobile-hint {
                opacity: 0.6;
                font-size: 0.75rem;
            }
        }

        /* 玩家统计面板 */
        .player-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 0.8em;
        }
        .stat-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 6px 16px;
            color: #ddd;
            font-size: clamp(0.75rem, 1.4vw, 0.9rem);
            font-weight: 600;
        }
        .stat-item span {
            color: var(--yellow);
            font-weight: 800;
        }

        /* 菜单小按钮 */
        .menu-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 0.6em;
        }
        .btn-sm {
            padding: clamp(8px, 1.5vh, 12px) clamp(20px, 4vw, 32px);
            font-size: clamp(0.85rem, 1.8vw, 1.05rem);
            font-weight: 700; border: none; border-radius: 30px;
            cursor: pointer;
            background: rgba(255,255,255,0.15); color: #fff;
            transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-sm:hover { background: rgba(255,255,255,0.30); transform: scale(1.08); box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
        .btn-sm:active { transform: scale(0.93); }

        /* 面板弹窗（商城/角色） */
        .panel-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.82);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 400;
            transition: opacity 0.3s;
        }
        .panel-modal.hidden { opacity: 0; pointer-events: none !important; }
        .panel-content {
            background: #1a1a30;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: clamp(16px, 3vh, 28px);
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: #fff;
        }
        .panel-title {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            font-weight: 900;
            margin-bottom: 0.6em;
            text-align: center;
        }
        .panel-balance {
            text-align: center;
            color: var(--yellow);
            font-weight: 700;
            font-size: clamp(0.9rem, 1.8vw, 1.1rem);
            margin-bottom: 0.8em;
        }
        .btn-close-panel {
            display: block;
            margin: 0.8em auto 0;
            background: rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            transition: transform 0.15s, background 0.2s;
        }
        .btn-close-panel:hover { background: rgba(255,255,255,0.35); transform: scale(1.05); }
        .btn-close-panel:active { transform: scale(0.95); }

        /* 商城商品卡 */
        .shop-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            gap: 10px;
        }
        .shop-item .item-icon { font-size: 1.8em; }
        .shop-item .item-info { flex: 1; }
        .shop-item .item-name { font-weight: 700; font-size: 0.95rem; }
        .shop-item .item-desc { font-size: 0.75rem; color: #aaa; }
        .shop-item .item-cost { color: var(--yellow); font-weight: 700; }
        .shop-item .btn-buy {
            padding: 6px 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.82rem;
            background: #4ecb71;
            color: #1a1a2e;
            transition: transform 0.12s;
        }
        .shop-item .btn-buy:active { transform: scale(0.92); }
        .shop-item .btn-buy.owned { background: #666; color: #ccc; cursor: default; }

        /* 角色预设 */
        .char-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1em;
        }
        .char-preset {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.08);
            transition: border 0.2s, transform 0.15s;
        }
        .char-preset:hover { transform: scale(1.08); }
        .char-preset.selected { border-color: var(--yellow); }
        .char-colors {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 0.8em;
        }
        .char-colors label {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .char-colors input[type="color"] {
            width: 36px; height: 28px;
            border: none; border-radius: 6px;
            cursor: pointer;
        }

        /* 底部道具计时条 */
        #bottom-timer-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.75);
            padding: 8px 16px;
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 60;
            transition: opacity 0.3s;
        }
        #bottom-timer-bar.hidden { opacity: 0; pointer-events: none; }
        #bottom-timer-items {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .bottom-timer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-weight: 700;
            font-size: clamp(0.8rem, 1.5vw, 0.95rem);
        }
        .bottom-timer-item .bt-icon { font-size: 1.3em; }
        .bottom-timer-bar-bg {
            width: 80px; height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        .bottom-timer-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.15s linear;
        }

        /* 右下道具库存面板 */
        #inventory-panel {
            position: absolute;
            right: clamp(8px, 2vw, 16px);
            bottom: clamp(60px, 10vh, 100px);
            background: rgba(0,0,0,0.78);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 14px;
            padding: 10px 14px;
            z-index: 55;
            min-width: 130px;
            transition: opacity 0.3s;
        }
        #inventory-panel.hidden { opacity: 0; pointer-events: none; }
        .inv-title {
            color: #ffd700;
            font-weight: 800;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 6px;
        }
        .inv-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            margin: 3px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .inv-item:hover { background: rgba(255,255,255,0.18); transform: scale(1.03); }
        .inv-item:active { transform: scale(0.95); }
        .inv-item .inv-icon { font-size: 1.2em; }
        .inv-item .inv-count {
            margin-left: auto;
            background: var(--yellow);
            color: #1a1a2e;
            border-radius: 10px;
            padding: 1px 8px;
            font-weight: 800;
            font-size: 0.78rem;
        }
        .inv-item.empty { opacity: 0.4; cursor: default; }
        .inv-item.empty:hover { background: rgba(255,255,255,0.06); transform: none; }

        /* 库存提示 */
        .shop-item .item-stock {
            font-size: 0.72rem;
            color: #aaa;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <!-- UI 层 -->
    <div id="ui-layer">
        <!-- 开始界面 -->
        <div id="menu-screen">
            <div class="title">🚇 地铁跑酷</div>
            <div class="subtitle">3D Subway Surfer</div>
            <!-- 玩家数据统计 -->
            <div class="player-stats" id="player-stats">
                <div class="stat-item">🏆 最高分：<span id="menu-highscore">0</span></div>
                <div class="stat-item">📏 最远距离：<span id="menu-maxdist">0</span>m</div>
                <div class="stat-item">💰 累计金币：<span id="menu-totalcoins">0</span></div>
                <div class="stat-item">🔑 游戏次数：<span id="menu-plays">30</span></div>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js">
    </script>
    <script>
        (function() {
            // ==================== 全局状态 ====================
            const GAME_STATES = { MENU: 'menu', PLAYING: 'playing', PAUSED: 'paused', GAMEOVER: 'gameover' };
            let gameState = GAME_STATES.MENU;
            let score = 0;
            let highScore = parseInt(localStorage.getItem('subwayHighScore') || '0');
            let distance = 0;
            let speed = 8;
            const BASE_SPEED = 8;
            const MAX_SPEED = 12;
            let comboCount = 0;
            let lastCollectTime = 0;
            let currentLane = 0; // -1, 0, 1
            let actualX = 0;
            let isJumping = false;
            let isCrouching = false;
            let verticalVelocity = 0;
            let playerY = 0;
            let hasDoubleJumped = false;
            let doubleJumpAvailable = false;
            let activePowerUps = {}; // { magnet, doubleScore, jetpack, skate }
            let police = null;
            let policeSpeed = 7;
            let policeZ = -10;
            let policeActive = false;
            let policeTimer = 0;
            let sirenCooldown = 0;
            let headStartTimer = 0;
            let reviveProtectionTimer = 0; // 复活后30秒保护
            let worldItems = [];
            let particles = [];
            let floatTexts = [];
            let trackSegments = [];
            let currentTheme = 0;
            let lastThemeSwitchZ = 0;
            let spawnTimer = 0;
            let spawnInterval = 1.0;
            let lastSpawnZ = 0;
            let lastSpawnWasObstacle = false;
            let dynamicDifficulty = 0; // 路程联动动态难度（0~1）
            let gameTime = 0;
            let isMuted = false;
            let globalGain = 0.5;
            let bgMusicNodes = [];
            let bgMusicInterval = null;
            let bgMusicBPM = 120;
            let bgMusicNoteIndex = 0;
            let btThrottle = 0;
            let jetCoinTimer = 0;
            // 性能优化：预缓存常量与DOM引用
            const LANES = [-1.5, 0, 1.5];
            const GRAVITY = -16;
            const isMobileDevice = window.innerWidth <= 768;
            const WORLD_ITEM_CAP = isMobileDevice ? 45 : 60;
            const PARTICLE_CAP = isMobileDevice ? 18 : 25;
            const domHud = document.getElementById('hud');
            const domHudScore = document.getElementById('hud-score');
            const domHudDistance = document.getElementById('hud-distance');
            const domHudCombo = document.getElementById('hud-combo');
            const domPowerupSlots = document.getElementById('powerup-slots');
            const domMenuScreen = document.getElementById('menu-screen');
            const domPauseOverlay = document.getElementById('pause-overlay');
            const domGameoverOverlay = document.getElementById('gameover-overlay');
            const domGoScore = document.getElementById('go-score');
            const domGoDistance = document.getElementById('go-distance');
            const domGoRecord = document.getElementById('go-record');
            const domReviveBtn = document.getElementById('btn-revive-go');
            const domBottomTimerBar = document.getElementById('bottom-timer-bar');
            const domBottomTimerItems = document.getElementById('bottom-timer-items');
            const domMobileHint = document.getElementById('mobile-hint');
            const domUiLayer = document.getElementById('ui-layer');
            const domInvPanel = document.getElementById('inventory-panel');
            const domInvItems = document.getElementById('inv-items');
            const domShopBalance = document.getElementById('shop-balance');
            const domShopItems = document.getElementById('shop-items');
            const domMenuHighscore = document.getElementById('menu-highscore');
            const domMenuMaxdist = document.getElementById('menu-maxdist');
            const domMenuTotalcoins = document.getElementById('menu-totalcoins');
            const domMenuPlays = document.getElementById('menu-plays');

            // ==================== 持久化数据：库存/商城/角色/统计 ====================
            let totalCoins = parseInt(localStorage.getItem('subwayTotalCoins') || '0');
            let maxDistance = parseInt(localStorage.getItem('subwayMaxDistance') || '0');
            // 道具库存（消耗品）+ 钥匙🔑 + 每日次数
            let inventory = JSON.parse(localStorage.getItem('subwayInventory') || '{"headStart":0,"skate":0,"magnet":5,"jetpack":0,"keys":0}');
            let charConfig = JSON.parse(localStorage.getItem('subwayChar') || '{"body":"#3388ff","hat":"#dd3333","shoe":"#dd3333"}');
            // 每日免费次数
            const DAILY_FREE_PLAYS = 30;
            let dailyPlaysRemaining = DAILY_FREE_PLAYS;
            let dailyPlaysDate = localStorage.getItem('subwayPlaysDate') || '';
            const todayStr = new Date().toISOString().slice(0, 10);
            if (dailyPlaysDate !== todayStr) {
                dailyPlaysRemaining = DAILY_FREE_PLAYS;
                dailyPlaysDate = todayStr;
                localStorage.setItem('subwayPlaysDate', todayStr);
                localStorage.setItem('subwayPlaysRemaining', dailyPlaysRemaining);
            } else {
                dailyPlaysRemaining = parseInt(localStorage.getItem('subwayPlaysRemaining') || DAILY_FREE_PLAYS);
            }

            const SHOP_ITEMS = [
                { id: 'headStart', name: '🚀 抢先起步', desc: '开局获得10秒全局加速', cost: 80, icon: '🚀' },
                { id: 'skate', name: '🛹 滑板', desc: '25%移速加成，持续8秒', cost: 120, icon: '🛹' },
                { id: 'magnet', name: '🧲 磁铁', desc: '自动吸附金币，持续5秒', cost: 100, icon: '🧲' },
                { id: 'jetpack', name: '🚀 喷气背包', desc: '50%移速加成+飞行，持续4秒', cost: 200, icon: '🚀' },
                { id: 'keys', name: '🔑 钥匙', desc: '1把钥匙=1次游戏次数', cost: 200, icon: '🔑' },
            ];
            const SHOP_MAP = new Map(SHOP_ITEMS.map(item => [item.id, item]));
            // 道具效果激活状态（库存使用后生效）
            let activeInventoryEffect = null; // { type, timer }
            const INVENTORY_DURATIONS = { headStart: 10, skate: 8, magnet: 5, jetpack: 4 };

            const CHAR_PRESETS = [
                { id: 'boy', name: '男生', icon: '👦', body: '#3388ff', hat: '#dd3333', shoe: '#dd3333' },
                { id: 'girl', name: '女生', icon: '👧', body: '#ff66aa', hat: '#ff88cc', shoe: '#ff4488' },
                { id: 'robot', name: '机器人', icon: '🤖', body: '#aaaaaa', hat: '#666666', shoe: '#444444' },
                { id: 'alien', name: '外星人', icon: '👽', body: '#44cc44', hat: '#228822', shoe: '#116611' },
                { id: 'ninja', name: '忍者', icon: '🥷', body: '#222222', hat: '#111111', shoe: '#000000' },
            ];
            let selectedCharPreset = localStorage.getItem('subwayCharPreset') || 'boy';

            function savePersistentData() {
                localStorage.setItem('subwayTotalCoins', totalCoins);
                localStorage.setItem('subwayMaxDistance', maxDistance);
                localStorage.setItem('subwayInventory', JSON.stringify(inventory));
                localStorage.setItem('subwayChar', JSON.stringify(charConfig));
                localStorage.setItem('subwayCharPreset', selectedCharPreset);
                localStorage.setItem('subwayPlaysRemaining', dailyPlaysRemaining);
                localStorage.setItem('subwayPlaysDate', dailyPlaysDate);
            }

            function getTotalPlays() {
                return dailyPlaysRemaining + (inventory.keys || 0);
            }

            function consumePlay() {
                if (dailyPlaysRemaining > 0) { dailyPlaysRemaining--; }
                else if (inventory.keys > 0) { inventory.keys--; }
                savePersistentData();
            }

            function applyCharConfig() {
                const c = charConfig;
                if (playerBody && playerBody.material) playerBody.material.color.set(c.body);
                if (leftArm && leftArm.material) leftArm.material.color.set(c.body);
                if (rightArm && rightArm.material) rightArm.material.color.set(c.body);
                if (hat && hat.material) hat.material.color.set(c.hat);
                if (hatVisor && hatVisor.material) hatVisor.material.color.set(c.hat);
                if (leftShoe && leftShoe.material) leftShoe.material.color.set(c.shoe);
                if (rightShoe && rightShoe.material) rightShoe.material.color.set(c.shoe);
            }

            // 使用库存道具
            function useInventoryItem(type) {
                if (gameState !== GAME_STATES.PLAYING) return;
                if (!inventory[type] || inventory[type] <= 0) return;
                inventory[type]--;
                savePersistentData();
                updateInventoryPanel();
                // 激活道具效果
                activeInventoryEffect = { type, timer: INVENTORY_DURATIONS[type] };
                // 应用对应特效
                if (type === 'magnet') {
                    magnetRing.visible = true;
                } else if (type === 'jetpack') {
                    jetFlameGroup.visible = true;
                    if (!isJumping) { isJumping = true; verticalVelocity = 5; playerY = 1.5; }
                    isCrouching = false;
                } else if (type === 'skate') {
                    skateGroup.visible = true;
                    doubleJumpAvailable = true;
                }
                playSound('powerup');
                spawnFloatText(actualX, playerY + 2, playerGroup.position.z, '使用 ' + SHOP_MAP.get(type).name, '#00ff88');
            }

            // ==================== Three.js 初始化 ====================
            const container = document.getElementById('game-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.3, 200);
            camera.position.set(0, 3.5, -8);

            const renderer = new THREE.WebGLRenderer({ antialias: !isMobileDevice, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(container.clientWidth, container.clientHeight);
            // 移动端降级像素比，减轻GPU填充率压力
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobileDevice ? 1.0 : 1.5));
            // 移动端关闭阴影大幅提升帧率；桌面端使用低分辨率阴影
            renderer.shadowMap.enabled = !isMobileDevice;
            if (!isMobileDevice) {
                renderer.shadowMap.type = THREE.PCFShadowMap;
            }
            // 关闭色调映射，减少GPU后处理开销
            renderer.toneMapping = THREE.NoToneMapping;
            container.appendChild(renderer.domElement);

            // 灯光
            const ambientLight = new THREE.AmbientLight(0x334455, 1.8);
            scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
            sunLight.position.set(10, 20, 5);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 256;
            sunLight.shadow.mapSize.height = 256;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 40;
            sunLight.shadow.camera.left = -8;
            sunLight.shadow.camera.right = 8;
            sunLight.shadow.camera.top = 8;
            sunLight.shadow.camera.bottom = -3;
            sunLight.shadow.bias = -0.0001;
            scene.add(sunLight);

            const pointLight1 = new THREE.PointLight(0xffcc88, 2.5, 16);
            pointLight1.position.set(0, 3, 5);
            scene.add(pointLight1);

            // 天空渐变
            function createSkyTexture(themeIdx) {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                const themes = [
                    ['#1a2a3a', '#2c4a6e', '#5a8ab5', '#aad0f0'],
                    ['#2a1a1a', '#5c3a2a', '#b87a50', '#f0c090'],
                    ['#0a0a1a', '#1a1a3a', '#2a2a5a', '#4a4a80'],
                    ['#1a2a1a', '#2a4a2a', '#4a7a3a', '#80b060'],
                ];
                const colors = themes[themeIdx % themes.length];
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, colors[0]);
                gradient.addColorStop(0.4, colors[1]);
                gradient.addColorStop(0.75, colors[2]);
                gradient.addColorStop(1, colors[3]);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                return new THREE.CanvasTexture(canvas);
            }
            let skyTexture = createSkyTexture(0);
            scene.background = skyTexture;
            scene.fog = new THREE.Fog(0x1a2a3a, 25, 80);

            // ==================== 音频系统 ====================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(type) {
                if (!audioCtx || isMuted) return;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const masterGain = ctx.createGain();
                masterGain.gain.value = globalGain;
                masterGain.connect(ctx.destination);

                switch (type) {
                    case 'coin': {
                        // 清脆双音“叮”声
                        [1200, 1600].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(freq, now + i * 0.03);
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(0.28, now + i * 0.03);
                            g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.03 + 0.11);
                            osc.connect(g); g.connect(masterGain);
                            osc.start(now + i * 0.03);
                            osc.stop(now + i * 0.03 + 0.11);
                        });
                        break;
                    }
                    case 'jump': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.linearRampToValueAtTime(600, now + 0.15);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.25, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                        osc.connect(g);
                        g.connect(masterGain);
                        osc.start(now);
                        osc.stop(now + 0.18);
                        break;
                    }
                    case 'crouch': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.linearRampToValueAtTime(150, now + 0.1);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.2, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                        osc.connect(g);
                        g.connect(masterGain);
                        osc.start(now);
                        osc.stop(now + 0.12);
                        break;
                    }
                    case 'powerup': {
                        [523, 659, 784].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            osc.type = 'triangle';
                            osc.frequency.setValueAtTime(freq, now + i * 0.04);
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(0.22, now + i * 0.04);
                            g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                            osc.connect(g);
                            g.connect(masterGain);
                            osc.start(now + i * 0.04);
                            osc.stop(now + 0.28);
                        });
                        break;
                    }
                    case 'train': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.linearRampToValueAtTime(100, now + 0.5);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.3, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
                        osc.connect(g);
                        g.connect(masterGain);
                        osc.start(now);
                        osc.stop(now + 0.55);
                        break;
                    }
                    case 'crash': {
                        const bufferSize = ctx.sampleRate * 0.25;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.06));
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.5, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                        noise.connect(g);
                        g.connect(masterGain);
                        noise.start(now);
                        const osc2 = ctx.createOscillator();
                        osc2.type = 'sine';
                        osc2.frequency.setValueAtTime(60, now);
                        const g2 = ctx.createGain();
                        g2.gain.setValueAtTime(0.4, now);
                        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                        osc2.connect(g2);
                        g2.connect(masterGain);
                        osc2.start(now);
                        osc2.stop(now + 0.35);
                        break;
                    }
                    case 'gameover': {
                        [440, 392, 349, 311, 261].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(freq, now + i * 0.15);
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(0.3, now + i * 0.15);
                            g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.2);
                            osc.connect(g);
                            g.connect(masterGain);
                            osc.start(now + i * 0.15);
                            osc.stop(now + i * 0.15 + 0.2);
                        });
                        break;
                    }
                    case 'click': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(1000, now);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.15, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                        osc.connect(g);
                        g.connect(masterGain);
                        osc.start(now);
                        osc.stop(now + 0.03);
                        break;
                    }
                }
                setTimeout(() => { masterGain.disconnect(); }, 600);
            }

            function startBgMusic() {
                stopBgMusic();
                if (!audioCtx || isMuted) return;
                bgMusicBPM = Math.round(120 + (speed - BASE_SPEED) * 5);
                const beatInterval = 60000 / bgMusicBPM / 2;
                const notes = [262, 294, 330, 349, 392, 349, 330, 294, 262, 330, 392, 440, 392, 330, 294, 262];
                bgMusicNoteIndex = 0;

                function playNote() {
                    if (gameState !== GAME_STATES.PLAYING || isMuted || !audioCtx) return;
                    const ctx = audioCtx;
                    const now = ctx.currentTime;
                    const freq = notes[bgMusicNoteIndex % notes.length];
                    const osc = ctx.createOscillator();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freq, now);
                    const g = ctx.createGain();
                    g.gain.setValueAtTime(0.06 * globalGain, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + beatInterval / 1000 * 0.7);
                    osc.connect(g);
                    g.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + beatInterval / 1000 * 0.8);
                    bgMusicNodes.push({ osc, g });
                    bgMusicNoteIndex++;
                }
                playNote();
                bgMusicInterval = setInterval(() => {
                    if (gameState === GAME_STATES.PLAYING && !isMuted && audioCtx) {
                        bgMusicBPM = Math.round(120 + (speed - BASE_SPEED) * 5);
                        const newInterval = 60000 / bgMusicBPM / 2;
                        playNote();
                    }
                    bgMusicNodes = bgMusicNodes.filter(n => {
                        try { return n.osc.playbackState !== 'finished'; } catch (
                        e) { return false; }
                    });
                }, beatInterval);

            // ==================== 轨道系统 ====================

            function getThemeColors(themeIdx) {
                const themes = [
                    { wall: 0x556677, rail: 0x888888, accent: 0xff8844, fog: 0x1a2a3a, sky: 0 },
                    { wall: 0x6b4a3a, rail: 0x999999, accent: 0xffaa55, fog: 0x2a1a1a, sky: 1 },
                    { wall: 0x334466, rail: 0x777788, accent: 0x44aaff, fog: 0x0a0a1a, sky: 2 },

                ];
                return themes[themeIdx % themes.length];
            }

            function createTrackSegment(startZ, endZ, themeIdx) {
                const segment = new THREE.Group();
                const length = endZ - startZ;
                const midZ = (startZ + endZ) / 2;
                const colors = getThemeColors(themeIdx);
                // 计算斜坡高度：采样段内多个点取平均
                const samples = 10;
                let avgGroundY = 0;
                for (let si = 0; si < samples; si++) {
                    avgGroundY += getGroundHeight(startZ + (endZ - startZ) * si / (samples - 1));
                }
                avgGroundY /= samples;

                // 地面 - 跟随地形高度
                const groundThickness = 0.15 + avgGroundY;
                const ground = new THREE.Mesh(
                    new THREE.BoxGeometry(7, groundThickness, length),
                    new THREE.MeshStandardMaterial({ color: avgGroundY > 0.5 ? 0x5a5040 : 0x4a4535, roughness: 0.8, metalness: 0.1 })
                );
                ground.position.set(0, -0.075 + avgGroundY / 2, midZ);
                ground.receiveShadow = true;
                segment.add(ground);

                // 三条清晰双铁轨（每轨左右双钢轨，取消内层轨枕以降低draw call）
                const railGauge = 0.28;
                LANES.forEach(laneX => {
                    // 轨道碎石路基
                    const railBed = new THREE.Mesh(
                        new THREE.BoxGeometry(1.0, 0.04, length),
                        new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9, metalness: 0.05 })
                    );
                    railBed.position.set(laneX, -0.02 + avgGroundY, midZ);
                    railBed.receiveShadow = true;
                    segment.add(railBed);
                    // 双钢轨
                    [-railGauge, railGauge].forEach(offset => {
                        const rail = new THREE.Mesh(
                            new THREE.BoxGeometry(0.08, 0.06, length),
                            new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.12, metalness: 0.92 })
                        );
                        rail.position.set(laneX + offset, 0.04 + avgGroundY, midZ);
                        rail.receiveShadow = true;
                        segment.add(rail);
                    });
                });

                // 跨轨大枕木（低频，减少mesh数）
                for (let z = startZ; z < endZ; z += 4.5) {
                    const sleeper = new THREE.Mesh(
                        new THREE.BoxGeometry(4.8, 0.05, 0.14),
                        new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.55, metalness: 0.1 })
                    );
                    sleeper.position.set(0, 0.02 + avgGroundY, z);
                    sleeper.receiveShadow = true;
                    segment.add(sleeper);
                }

                // 两侧墙壁
                [-3.5, 3.5].forEach(x => {
                    const wall = new THREE.Mesh(
                        new THREE.BoxGeometry(0.3, 2.5, length),
                        new THREE.MeshStandardMaterial({ color: colors.wall, roughness: 0.5,
                            metalness: 0.2 })
                    );
                    wall.position.set(x, 1.25 + avgGroundY, midZ);
                    wall.receiveShadow = true;
                    wall.castShadow = true;
                    segment.add(wall);
                });

                // 精简信号灯（仅轨道旁小灯，降低视觉密度）
                for (let z = startZ + 6; z < endZ - 6; z += 18) {
                    const signalLight = new THREE.Mesh(
                        new THREE.BoxGeometry(0.1, 0.1, 0.1),
                        new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.1,
                            metalness: 0.1, emissive: 0xff0000, emissiveIntensity: 0.7 })
                    );
                    signalLight.position.set(0, 0.2 + avgGroundY, z);
                    segment.add(signalLight);
                }

                // 坡道+火车顶场景：在对应z区间生成梯子/平台
                const rampCycle = getRampCycle(); // 动态坡道周期
                const segStartCycle = ((startZ % rampCycle) + rampCycle) % rampCycle;
                const segEndCycle = ((endZ % rampCycle) + rampCycle) % rampCycle;
                // 上坡梯子（600-630区间）
                if (segStartCycle < 630 && segEndCycle > 600) {
                    const rStart = Math.max(startZ, Math.floor(startZ / rampCycle) * rampCycle + 600);
                    const rEnd = Math.min(endZ, Math.floor(startZ / rampCycle) * rampCycle + 630);
                    const stepCount = 10;
                    for (let si = 0; si < stepCount; si++) {
                        const stepZ = rStart + (rEnd - rStart) * si / stepCount;
                        const stepH = ((stepZ - rStart) / (rEnd - rStart)) * 3.5;
                        if (stepZ >= startZ && stepZ <= endZ) {
                            const step = new THREE.Mesh(
                                new THREE.BoxGeometry(4.0, 0.15, 0.5),
                                new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.4, metalness: 0.3 })
                            );
                            step.position.set(0, stepH, stepZ - midZ);
                            step.receiveShadow = true; step.castShadow = true;
                            segment.add(step);
                        }
                    }
                }
                // 火车顶平台（630-730区间）
                if ((segStartCycle < 730 && segStartCycle >= 630) || (segEndCycle > 630 && segEndCycle <= 730) ||
                    (segStartCycle < 630 && segEndCycle > 730)) {
                    const pStart = Math.max(startZ, Math.floor(startZ / rampCycle) * rampCycle + 630);
                    const pEnd = Math.min(endZ, Math.floor(startZ / rampCycle) * rampCycle + 730);
                    if (pEnd > pStart) {
                        const platLen = pEnd - pStart;
                        const platMid = (pStart + pEnd) / 2;
                        // 平台主体
                        const platform = new THREE.Mesh(
                            new THREE.BoxGeometry(4.5, 0.3, platLen),
                            new THREE.MeshStandardMaterial({ color: 0x556677, roughness: 0.3, metalness: 0.5 })
                        );
                        platform.position.set(0, 3.5, platMid - midZ);
                        platform.receiveShadow = true; platform.castShadow = true;
                        segment.add(platform);
                        // 平台围栏
                        [-2.2, 2.2].forEach(fx => {
                            const fence = new THREE.Mesh(
                                new THREE.BoxGeometry(0.1, 0.6, platLen),
                                new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.6 })
                            );
                            fence.position.set(fx, 3.8, platMid - midZ);
                            segment.add(fence);
                        });
                    }
                }

                segment.position.y = 0;
                return segment;
            }

            // 路程联动动态地形周期：越远地形越密（800→650）
            function getRampCycle() {
                return 800 - dynamicDifficulty * 150;
            }

            // 坡道+火车顶地面高度查询
            function getGroundHeight(z) {
                const rampCycle = getRampCycle(); // 动态坡道周期
                const cycleZ = ((z % rampCycle) + rampCycle) % rampCycle;
                // 前600单位：平地
                if (cycleZ < 600) return 0;
                // 600-630：上坡（从0升到3.5）
                if (cycleZ < 630) return (cycleZ - 600) / 30 * 3.5;
                // 630-730：火车顶平台
                if (cycleZ < 730) return 3.5;
                // 730-760：下坡回落
                if (cycleZ < 760) return 3.5 - (cycleZ - 730) / 30 * 3.5;
                return 0;
            }

            // 轨道段快速索引（Set替代Array.some，O(1)查找）
            const trackSegmentKeys = new Set();
            const SEG_LENGTH = 24;

            function ensureTrackSegments(playerZ) {
                const minZ = playerZ - 15;
                const maxZ = playerZ + 35;

                // 检查需要哪些段（O(1) Set查找）
                let checkZ = Math.floor(minZ / SEG_LENGTH) * SEG_LENGTH;
                while (checkZ < maxZ) {
                    const key = checkZ;
                    if (!trackSegmentKeys.has(key)) {
                        trackSegmentKeys.add(key);
                        const seg = createTrackSegment(checkZ, checkZ + SEG_LENGTH, currentTheme);
                        seg.userData = { startZ: checkZ, endZ: checkZ + SEG_LENGTH };
                        scene.add(seg);
                        trackSegments.push(seg);
                    }
                    checkZ += SEG_LENGTH;
                }

                // 移除落后太多的段
                for (let i = trackSegments.length - 1; i >= 0; i--) {
                    const seg = trackSegments[i];
                    if (seg.userData.endZ < playerZ - 20) {
                        trackSegmentKeys.delete(seg.userData.startZ);
                        scene.remove(seg);
                        disposeGroup(seg);
                        trackSegments.splice(i, 1);
                    }
                }
            }

            function disposeGroup(group) {
                group.traverse(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(m => m.dispose());
                        } else {
                            child.material.dispose();
                        }
                    }
                });
            }

            function createTrain(x, z, hasTopExtension = false) {
                const group = new THREE.Group();
                const trainLength = 3.2 + Math.random() * 1.6;
                const bodyHeight = hasTopExtension ? 2.2 : 1.55;
                // 明亮多色火车
                const trainColors = [0x2266cc, 0xcc3333, 0xdd7711, 0x338844, 0x9933aa, 0xcc6600];
                const trainColor = trainColors[Math.floor(Math.random() * trainColors.length)];

                    new THREE.MeshStandardMaterial({ color: trainColor, roughness: 0.18, metalness: 0.55,
                        emissive: trainColor, emissiveIntensity: 0.12 })
                );
                body.position.y = bodyHeight / 2;
                body.castShadow = true;
                body.receiveShadow = true;
                body.name = 'trainBody';
                group.add(body);
                // 车窗
                for (let wz = -trainLength / 2 + 0.7; wz < trainLength / 2 - 0.4; wz += 0.85) {
                    const windowMesh = new THREE.Mesh(
                        new THREE.BoxGeometry(1.1, 0.38, 0.5),
                        new THREE.MeshStandardMaterial({ color: 0xaaddff, roughness: 0.06, metalness: 0.5,
                            emissive: 0x335577, emissiveIntensity: 0.45 })
                    );
                    windowMesh.position.set(0, bodyHeight * 0.52, wz);
                    group.add(windowMesh);
                }
                // 白色顶部装饰条
                const topStripe = new THREE.Mesh(
                    new THREE.BoxGeometry(1.62, 0.05, trainLength),
                    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.12, metalness: 0.6,
                        emissive: 0x333333, emissiveIntensity: 0.15 })
                );
                topStripe.position.y = bodyHeight;
                group.add(topStripe);
                // 额外车厢顶
                if (hasTopExtension) {
                    const topExt = new THREE.Mesh(
                        new THREE.BoxGeometry(1.8, 0.45, trainLength + 0.4),
                        new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.22, metalness: 0.5,
                            emissive: 0x221111, emissiveIntensity: 0.3 })
                    );
                    topExt.position.y = bodyHeight + 0.28;
                    topExt.castShadow = true;
                    group.add(topExt);
                }
                // 底架
                const underframe = new THREE.Mesh(
                    new THREE.BoxGeometry(1.7, 0.12, trainLength + 0.2),
                    new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.6 })
                );
                underframe.position.y = 0.06;
                group.add(underframe);
                group.position.set(x, getGroundHeight(z), z);
                group.userData = {
                    type: 'train',
                    x: x,
                    z: z,
                    width: 1.8,
                    height: bodyHeight + (hasTopExtension ? 0.5 : 0.1),
                    depth: trainLength,
                    hasTopExtension: hasTopExtension,
                    flashTimer: 0
                };
                scene.add(group);
                worldItems.push(group);
                return group;
            }

            function createHurdle(x, z) {
                const group = new THREE.Group();
                // 跨栏：两根立柱+横梁，角色需下蹲通过
                const postMat = new THREE.MeshStandardMaterial({ color: 0xee4444, roughness: 0.2, metalness: 0.5,
                    emissive: 0x330000, emissiveIntensity: 0.2 });
                const barMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.15, metalness: 0.4,
                    emissive: 0x332200, emissiveIntensity: 0.3 });
                // 左立柱
                const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.9, 0.1), postMat);
                leftPost.position.set(-0.5, 0.45, 0);
                leftPost.castShadow = true;
                group.add(leftPost);
                // 右立柱
                const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.9, 0.1), postMat);
                rightPost.position.set(0.5, 0.45, 0);
                rightPost.castShadow = true;
                group.add(rightPost);
                // 顶部横梁
                const topBar = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.1, 0.15), barMat);
                topBar.position.set(0, 0.9, 0);
                topBar.castShadow = true;
                group.add(topBar);
                // 底部横梁（视觉装饰）
                const bottomBar = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.06, 0.12), postMat);
                bottomBar.position.set(0, 0.05, 0);
                group.add(bottomBar);
                group.position.set(x, getGroundHeight(z), z);
                group.userData = { type: 'hurdle', x: x, z: z, height: 0.95, width: 1.3, depth: 0.25 };

                worldItems.push(group);

            }

            function createPowerUp(x, z, powerType) {
                const group = new THREE.Group();
                let color, geom;
                switch (powerType) {
                    case 'magnet':
                        geom = new THREE.BoxGeometry(0.4, 0.4, 0.4);
                        color = 0x44aaff;
                        break;
                    case 'doubleScore':
                        geom = new THREE.OctahedronGeometry(0.3);
                        color = 0xffd700;
                        break;
                    case 'jetpack':
                        geom = new THREE.CylinderGeometry(0.2, 0.25, 0.6, 8);
                        color = 0xcccccc;
                        break;
                    case 'skate':
                        geom = new THREE.BoxGeometry(0.5, 0.08, 0.8);
                        color = 0x8B4513;
                        break;
                    default:
                        geom = new THREE.BoxGeometry(0.35, 0.35, 0.35);
                        color = 0xffffff;
                }
                const mesh = new THREE.Mesh(
                    geom,
                    new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, metalness: 0.6, emissive: color,
                        emissiveIntensity: 0.6 })
                );
                mesh.position.y = 0.45;
                mesh.castShadow = true;
                group.add(mesh);
                group.position.set(x, getGroundHeight(z), z);
                group.userData = { type: 'powerup', powerType: powerType, x: x, z: z, baseY: 0.45, floatPhase: Math.random() *
                        Math.PI * 2 };
                scene.add(group);
                worldItems.push(group);
                return group;
            }

            // 获取当前关卡（基于距离，每400米一关）
            function getCurrentLevel() {
                return Math.floor(distance / 400) + 1;
            }

            // 路程联动动态难度（0→1平滑递增，~3000米封顶）
            function updateDynamicDifficulty() {
                dynamicDifficulty = Math.min(distance / 3000, 1.0);
            }

            // 检查指定位置附近是否存在障碍物（最高优先级约束）
            function hasNearbyObstacle(x, z, minGap) {
                const checkRange = minGap + 4; // 仅扫描Z轴相关范围内的物品
                for (const item of worldItems) {
                    const ud = item.userData;
                    if (!ud.type || ud.type === 'coin' || ud.type === 'powerup') continue;
                    const iz = ud.z !== undefined ? ud.z : item.position.z;
                    // Z轴快速剔除
                    if (Math.abs(z - iz) > checkRange) continue;
                    const ix = ud.x !== undefined ? ud.x : item.position.x;
                    // 仅检查同轨道
                    if (Math.abs(ix - x) > 0.55) continue;
                    // 计算该障碍物的Z轴跨度：minGap必须扣除障碍物自身深度
                    const itemHalfDepth = (ud.depth || 1.5) / 2;
                    if (Math.abs(z - iz) < minGap + itemHalfDepth) {
                        return true;
                    }
                }
                return false;
            }

            function spawnWorldItem(playerZ) {
                const minZ = playerZ + 15;
                const maxZ = playerZ + 28;
                const z = minZ + Math.random() * (maxZ - minZ);
                const lanes = LANES;

                // 关卡感知障碍物密度控制（第2关起生效）
                const level = getCurrentLevel();
                // levelFactor: 第1关=1.0, 第2关=0.82, 第3关=0.68, 最低0.38
                const levelFactor = level >= 2 ? Math.max(0.38, 1.0 - (level - 1) * 0.09) : 1.0;
                // 最小安全间距（中心到中心）：关卡越高间距越大（6~9单位），始终>障碍物自身深度
                const minSpacing = 5.5 + level * 0.25;

                // 强制安全间距：扫描已存在障碍物，若本轮Z位置附近已有障碍则直接跳过
                if (lastSpawnWasObstacle && Math.abs(z - lastSpawnZ) < minSpacing) {
                    return;
                }

                const numItems = 2 + Math.floor(Math.random() * 3);
                const usedLanes = new Set();
                let obstacleCount = 0;

                // 关卡越高，金币占比越大（用金币填充原本障碍物的位置）
                const coinRate = 0.55 + (level >= 2 ? (1 - levelFactor) * 0.35 : 0);

                for (let i = 0; i < numItems; i++) {
                    const availableLanes = lanes.filter(l => !usedLanes.has(l));
                    if (availableLanes.length === 0) break;
                    const lane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
                    usedLanes.add(lane);

                    const rand = Math.random();
                    if (rand < coinRate) {
                        // 金币
                        if (Math.random() < 0.30) {
                            createCoinArc(lane, z);
                        } else {
                            const coinCount = 3 + Math.floor(Math.random() * 3);
                            for (let ci = 0; ci < coinCount; ci++) {
                                createCoin(lane, z + ci * 0.6 + (Math.random() - 0.5) * 0.3, 0.55);
                            }
                        }
                    } else if (rand < coinRate + 0.15 * levelFactor) {
                        // 列车：生成前检查该轨道是否有邻近障碍物
                        if (!hasNearbyObstacle(lane, z, minSpacing)) {
                            const hasTop = Math.random() < 0.35;
                            createTrain(lane, z, hasTop);
                            obstacleCount++;
                            if (hasTop && Math.random() < 0.4 && availableLanes.length > 1) {
                                const otherLanes = lanes.filter(l => l !== lane);
                                const ol = otherLanes[Math.floor(Math.random() * otherLanes.length)];
                                if (!usedLanes.has(ol) && !hasNearbyObstacle(ol, z + 1.2, minSpacing)) {
                                    usedLanes.add(ol);
                                    createLowObstacle(ol, z + 1.2);
                                    obstacleCount++;
                                }
                            }
                        }
                    } else if (rand < coinRate + (0.15 + 0.10) * levelFactor) {
                        if (!hasNearbyObstacle(lane, z, minSpacing)) {
                            createHighObstacle(lane, z);
                            obstacleCount++;
                        }
                    } else if (rand < coinRate + (0.15 + 0.10 + 0.08) * levelFactor) {
                        if (!hasNearbyObstacle(lane, z, minSpacing)) {
                            createLowObstacle(lane, z);
                            obstacleCount++;
                        }
                    } else if (rand < coinRate + (0.15 + 0.10 + 0.08 + 0.05) * levelFactor) {
                        if (!hasNearbyObstacle(lane, z, minSpacing)) {
                            createHurdle(lane, z);
                            obstacleCount++;
                        }
                    } else {
                        const powerTypes = ['magnet', 'doubleScore', 'jetpack', 'skate'];
                        const pt2 = powerTypes[Math.floor(Math.random() * powerTypes.length)];
                        createPowerUp(lane, z, pt2);
                    }
                }

                lastSpawnZ = z;
                lastSpawnWasObstacle = obstacleCount > 0;
            }
