<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D 地铁跑酷 - Subway Surfer</title>
    <style>
        :root {
            --yellow: #FFD700;
            --blue: #1E90FF;
            --red: #FF4444;
            --bg: #1a1a2e;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            top: 0;
            left: 0;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
        }

        /* UI 覆盖层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #ui-layer>* {
            pointer-events: auto;
        }

        /* 开始界面 */
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 20, 0.85);
            z-index: 100;
            transition: opacity 0.3s;
        }
        #menu-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #menu-screen .title {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 900;
            color: var(--yellow);
            text-shadow: 3px 3px 0 #e07b00, 6px 6px 0 rgba(0, 0, 0, 0.4);
            letter-spacing: 0.05em;
            margin-bottom: 0.3em;
            text-align: center;
        }
        #menu-screen .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: #ccc;
            margin-bottom: 1.5em;
            letter-spacing: 0.1em;
        }
        #menu-screen .btn {
            display: inline-block;
            padding: clamp(14px, 2.5vh, 20px) clamp(40px, 8vw, 70px);
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: #1a1a2e;
        }
        .btn-play {
            background: var(--yellow);
            margin-bottom: 1em;
        }
        .btn-play:hover {
            background: #ffe44d;
            transform: scale(1.05);
            box-shadow: 0 8px 28px rgba(255, 215, 0, 0.5);
        }
        .btn-play:active {
            transform: scale(0.95);
        }
        #menu-screen .controls-info {
            color: #aaa;
            font-size: clamp(0.75rem, 1.5vw, 0.95rem);
            text-align: center;
            line-height: 1.8;
            margin-top: 0.5em;
        }
        #menu-screen .high-score {
            color: var(--yellow);
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            margin-top: 0.8em;
            font-weight: 600;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: clamp(8px, 1.5vh, 16px) clamp(12px, 3vw, 24px);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #hud.hidden {
            opacity: 0;
        }
        #hud>* {
            pointer-events: auto;
        }
        .hud-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .hud-score {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }
        .hud-combo {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            font-weight: 700;
            color: var(--yellow);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            transition: transform 0.15s;
        }
        .hud-distance {
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            color: #ccc;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        .hud-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        .powerup-slots {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .powerup-slot {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: clamp(0.7rem, 1.3vw, 0.85rem);
            color: #fff;
            min-width: 90px;
            transition: opacity 0.3s;
        }
        .powerup-slot .icon {
            font-size: 1.2em;
        }
        .powerup-slot .bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            overflow: hidden;
            min-width: 40px;
        }
        .powerup-slot .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .bar-magnet {
            background: #4dc9f6;
        }
        .bar-double {
            background: #ffd700;
        }
        .bar-jetpack {
            background: #ff6b6b;
        }
        .bar-skate {
            background: #51cf66;
        }
        .btn-volume {
            width: clamp(32px, 5vw, 40px);
            height: clamp(32px, 5vw, 40px);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: clamp(1rem, 2vw, 1.3rem);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .btn-volume:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .btn-pause {
            width: clamp(32px, 5vw, 40px);
            height: clamp(32px, 5vw, 40px);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: clamp(1rem, 2vw, 1.3rem);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .btn-pause:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 暂停 & 结束覆盖层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 90;
            transition: opacity 0.3s;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none !important;
        }
        .overlay .big-text {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.6);
            margin-bottom: 0.3em;
            text-align: center;
        }
        .overlay .big-text.red {
            color: var(--red);
        }
        .overlay .score-text {
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            color: #fff;
            margin: 0.3em 0;
        }
        .overlay .record-text {
            font-size: clamp(1rem, 2vw, 1.4rem);
            color: var(--yellow);
            font-weight: 700;
            animation: pulse 0.6s infinite alternate;
        }
        @keyframes pulse {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.08);
            }
        }
        .overlay .btn {
            padding: clamp(10px, 2vh, 16px) clamp(30px, 6vw, 55px);
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin: 0.4em;
            letter-spacing: 0.04em;
            transition: transform 0.15s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            color: #1a1a2e;
        }
        .btn-resume {
            background: #4ecb71;
        }
        .btn-resume:hover {
            background: #5de682;
            transform: scale(1.05);
        }
        .btn-resume:active {
            transform: scale(0.95);
        }
        .btn-restart {
            background: var(--yellow);
        }
        .btn-restart:hover {
            background: #ffe44d;
            transform: scale(1.05);
        }
        .btn-restart:active {
            transform: scale(0.95);
        }
        .btn-menu {
            background: #888;
            color: #fff;
        }
        .btn-menu:hover {
            background: #aaa;
            transform: scale(1.05);
        }
        .btn-menu:active {
            transform: scale(0.95);
        }

        /* 浮动文字 */
        .float-text {
            position: absolute;
            pointer-events: none;
            font-weight: 800;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: var(--yellow);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 55;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            60% {
                opacity: 0.8;
                transform: translateY(-40px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-70px) scale(0.8);
            }
        }

        /* 移动端底部提示 */
        #mobile-hint {
            position: absolute;
            bottom: clamp(20px, 4vh, 40px);
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(0.7rem, 1.4vw, 0.85rem);
            text-align: center;
            pointer-events: none;
            z-index: 45;
            transition: opacity 0.5s;
        }
        @media (min-width: 769px) {
            #mobile-hint {
                opacity: 0.35;
            }
        }
        @media (max-width: 768px) {
            #mobile-hint {
                opacity: 0.6;
                font-size: 0.75rem;
            }
        }

        /* 玩家统计面板 */
        .player-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 0.8em;
        }
        .stat-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 6px 16px;
            color: #ddd;
            font-size: clamp(0.75rem, 1.4vw, 0.9rem);
            font-weight: 600;
        }
        .stat-item span {
            color: var(--yellow);
            font-weight: 800;
        }

        /* 菜单小按钮 */
        .menu-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 0.6em;
        }
        .btn-sm {
            padding: clamp(8px, 1.5vh, 12px) clamp(20px, 4vw, 32px);
            font-size: clamp(0.85rem, 1.8vw, 1.05rem);
            font-weight: 700; border: none; border-radius: 30px;
            cursor: pointer;
            background: rgba(255,255,255,0.15); color: #fff;
            transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        .btn-sm:hover { background: rgba(255,255,255,0.30); transform: scale(1.08); box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
        .btn-sm:active { transform: scale(0.93); }

        /* 面板弹窗（商城/角色） */
        .panel-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.82);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 120;
            transition: opacity 0.3s;
        }
        .panel-modal.hidden { opacity: 0; pointer-events: none !important; }
        .panel-content {
            background: #1a1a30;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: clamp(16px, 3vh, 28px);
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: #fff;
        }
        .panel-title {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            font-weight: 900;
            margin-bottom: 0.6em;
            text-align: center;
        }
        .panel-balance {
            text-align: center;
            color: var(--yellow);
            font-weight: 700;
            font-size: clamp(0.9rem, 1.8vw, 1.1rem);
            margin-bottom: 0.8em;
        }
        .btn-close-panel {
            display: block;
            margin: 0.8em auto 0;
            background: rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            transition: transform 0.15s, background 0.2s;
        }
        .btn-close-panel:hover { background: rgba(255,255,255,0.35); transform: scale(1.05); }
        .btn-close-panel:active { transform: scale(0.95); }

        /* 商城商品卡 */
        .shop-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            gap: 10px;
        }
        .shop-item .item-icon { font-size: 1.8em; }
        .shop-item .item-info { flex: 1; }
        .shop-item .item-name { font-weight: 700; font-size: 0.95rem; }
        .shop-item .item-desc { font-size: 0.75rem; color: #aaa; }
        .shop-item .item-cost { color: var(--yellow); font-weight: 700; }
        .shop-item .btn-buy {
            padding: 6px 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.82rem;
            background: #4ecb71;
            color: #1a1a2e;
            transition: transform 0.12s;
        }
        .shop-item .btn-buy:active { transform: scale(0.92); }
        .shop-item .btn-buy.owned { background: #666; color: #ccc; cursor: default; }

        /* 角色预设 */
        .char-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1em;
        }
        .char-preset {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.08);
            transition: border 0.2s, transform 0.15s;
        }
        .char-preset:hover { transform: scale(1.08); }
        .char-preset.selected { border-color: var(--yellow); }
        .char-colors {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 0.8em;
        }
        .char-colors label {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .char-colors input[type="color"] {
            width: 36px; height: 28px;
            border: none; border-radius: 6px;
            cursor: pointer;
        }

        /* 底部道具计时条 */
        #bottom-timer-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.75);
            padding: 8px 16px;
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 60;
            transition: opacity 0.3s;
        }
        #bottom-timer-bar.hidden { opacity: 0; pointer-events: none; }
        #bottom-timer-items {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .bottom-timer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-weight: 700;
            font-size: clamp(0.8rem, 1.5vw, 0.95rem);
        }
        .bottom-timer-item .bt-icon { font-size: 1.3em; }
        .bottom-timer-bar-bg {
            width: 80px; height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        .bottom-timer-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.15s linear;
        }

        /* 右下道具库存面板 */
        #inventory-panel {
            position: absolute;
            right: clamp(8px, 2vw, 16px);
            bottom: clamp(60px, 10vh, 100px);
            background: rgba(0,0,0,0.78);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 14px;
            padding: 10px 14px;
            z-index: 55;
            min-width: 130px;
            transition: opacity 0.3s;
        }
        #inventory-panel.hidden { opacity: 0; pointer-events: none; }
        .inv-title {
            color: #ffd700;
            font-weight: 800;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 6px;
        }
        .inv-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            margin: 3px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .inv-item:hover { background: rgba(255,255,255,0.18); transform: scale(1.03); }
        .inv-item:active { transform: scale(0.95); }
        .inv-item .inv-icon { font-size: 1.2em; }
        .inv-item .inv-count {
            margin-left: auto;
            background: var(--yellow);
            color: #1a1a2e;
            border-radius: 10px;
            padding: 1px 8px;
            font-weight: 800;
            font-size: 0.78rem;
        }
        .inv-item.empty { opacity: 0.4; cursor: default; }
        .inv-item.empty:hover { background: rgba(255,255,255,0.06); transform: none; }

        /* 库存提示 */
        .shop-item .item-stock {
            font-size: 0.72rem;
            color: #aaa;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <!-- UI 层 -->
    <div id="ui-layer">
        <!-- 开始界面 -->
        <div id="menu-screen">
            <div class="title">🚇 地铁跑酷</div>
            <div class="subtitle">3D Subway Surfer</div>
            <!-- 玩家数据统计 -->
            <div class="player-stats" id="player-stats">
                <div class="stat-item">🏆 最高分：<span id="menu-highscore">0</span></div>
                <div class="stat-item">📏 最远距离：<span id="menu-maxdist">0</span>m</div>
                <div class="stat-item">💰 累计金币：<span id="menu-totalcoins">0</span></div>
                <div class="stat-item">🔑 游戏次数：<span id="menu-plays">30</span></div>
            </div>
            <button class="btn btn-play" id="btn-start">🎮 开始游戏</button>
            <div class="menu-actions">
                <button class="btn btn-sm" id="btn-shop">🛒 商城</button>
                <button class="btn btn-sm" id="btn-char">👤 角色</button>
            </div>
            <div class="controls-info">
                ←/→ 或 A/D 移动轨道 &nbsp;|&nbsp; ↑ 或 W 跳跃 &nbsp;|&nbsp; ↓ 或 S 下蹲<br>
                P 暂停 &nbsp;|&nbsp; R 重新开始
            </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-left">
                <div class="hud-score" id="hud-score">💰 0</div>
                <div class="hud-combo" id="hud-combo"></div>
                <div class="hud-distance" id="hud-distance">📏 0m</div>
            </div>
            <div class="hud-right">
                <div class="powerup-slots" id="powerup-slots"></div>
                <button class="btn-volume" id="btn-volume" title="音量">🔊</button>
                <button class="btn-pause" id="btn-pause" title="暂停">⏸</button>
            </div>
        </div>

        <!-- 暂停覆盖层 -->
        <div id="pause-overlay" class="overlay hidden">
            <div class="big-text">⏸ 游戏暂停</div>
            <button class="btn btn-resume" id="btn-resume">▶ 继续游戏</button>
            <button class="btn btn-restart" id="btn-restart-pause">🔄 重新开始</button>
            <button class="btn btn-menu" id="btn-menu-pause">🏠 返回主菜单</button>
        </div>

        <!-- 游戏结束覆盖层 -->
        <div id="gameover-overlay" class="overlay hidden">
            <div class="big-text red">💀 游戏结束</div>
            <div class="score-text" id="go-score">得分：0</div>
            <div class="score-text" id="go-distance">距离：0m</div>
            <div class="record-text hidden" id="go-record">🎉 新纪录！</div>
            <button class="btn btn-restart" id="btn-revive-go" style="background:#ff6b6b;color:#fff;">🔑 消耗5把钥匙复活</button>
            <button class="btn btn-restart" id="btn-restart-go">🔄 再来一次</button>
            <button class="btn btn-menu" id="btn-menu-go">🏠 返回主菜单</button>
        </div>

        <!-- 移动端提示 -->
        <div id="mobile-hint">👆 左半屏滑动切换轨道 | 右半屏上滑跳跃 / 下滑下蹲</div>

        <!-- 商城弹窗 -->
        <div id="shop-modal" class="panel-modal hidden">
            <div class="panel-content">
                <div class="panel-title">🛒 道具商城</div>
                <div class="panel-balance">💰 可用金币：<span id="shop-balance">0</span></div>
                <div class="shop-items" id="shop-items"></div>
                <button class="btn btn-sm btn-close-panel" id="btn-close-shop">✕ 关闭</button>
            </div>
        </div>

        <!-- 角色定制弹窗 -->
        <div id="char-modal" class="panel-modal hidden">
            <div class="panel-content">
                <div class="panel-title">👤 角色定制</div>
                <div class="char-presets" id="char-presets"></div>
                <div class="char-colors">
                    <label>上衣颜色：<input type="color" id="char-body-color" value="#3388ff"></label>
                    <label>帽子颜色：<input type="color" id="char-hat-color" value="#dd3333"></label>
                    <label>鞋子颜色：<input type="color" id="char-shoe-color" value="#dd3333"></label>
                </div>
                <button class="btn btn-sm btn-close-panel" id="btn-save-char">💾 保存</button>
                <button class="btn btn-sm btn-close-panel" id="btn-close-char">✕ 关闭</button>
            </div>
        </div>
    </div>

    <!-- 底部道具计时条 -->
    <div id="bottom-timer-bar" class="hidden">
        <div id="bottom-timer-items"></div>
    </div>

    <!-- 右下道具库存面板 -->
    <div id="inventory-panel" class="hidden">
        <div class="inv-title">🎒 道具</div>
        <div id="inv-items"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js">
    </script>
    <script>
        (function() {
            // ==================== 全局状态 ====================
            const GAME_STATES = { MENU: 'menu', PLAYING: 'playing', PAUSED: 'paused', GAMEOVER: 'gameover' };
            let gameState = GAME_STATES.MENU;
            let score = 0;
            let highScore = parseInt(localStorage.getItem('subwayHighScore') || '0');
            let distance = 0;
            let speed = 8;
            const BASE_SPEED = 8;
            const MAX_SPEED = 12;
            let comboCount = 0;
            let lastCollectTime = 0;
            let currentLane = 0; // -1, 0, 1
            let actualX = 0;
            let isJumping = false;
            let isCrouching = false;
            let verticalVelocity = 0;
            let playerY = 0;
            let hasDoubleJumped = false;
            let doubleJumpAvailable = false;
            let activePowerUps = {}; // { magnet, doubleScore, jetpack, skate }
            let police = null;
            let policeSpeed = 7;
            let policeZ = -10;
            let policeActive = false;
            let policeTimer = 0;
            let sirenCooldown = 0;
            let headStartTimer = 0;
            let reviveProtectionTimer = 0; // 复活后30秒保护
            let worldItems = [];
            let particles = [];
            let floatTexts = [];
            let trackSegments = [];
            let currentTheme = 0;
            let lastThemeSwitchZ = 0;
            let spawnTimer = 0;
            let spawnInterval = 1.0;
            let gameTime = 0;
            let isMuted = false;
            let globalGain = 0.5;
            let bgMusicNodes = [];
            let bgMusicInterval = null;
            let bgMusicBPM = 120;
            let bgMusicNoteIndex = 0;

            // ==================== 持久化数据：库存/商城/角色/统计 ====================
            let totalCoins = parseInt(localStorage.getItem('subwayTotalCoins') || '0');
            let maxDistance = parseInt(localStorage.getItem('subwayMaxDistance') || '0');
            // 道具库存（消耗品）+ 钥匙🔑 + 每日次数
            let inventory = JSON.parse(localStorage.getItem('subwayInventory') || '{"headStart":0,"skate":0,"magnet":5,"jetpack":0,"keys":0}');
            let charConfig = JSON.parse(localStorage.getItem('subwayChar') || '{"body":"#3388ff","hat":"#dd3333","shoe":"#dd3333"}');
            // 每日免费次数
            const DAILY_FREE_PLAYS = 30;
            let dailyPlaysRemaining = DAILY_FREE_PLAYS;
            let dailyPlaysDate = localStorage.getItem('subwayPlaysDate') || '';
            const todayStr = new Date().toISOString().slice(0, 10);
            if (dailyPlaysDate !== todayStr) {
                dailyPlaysRemaining = DAILY_FREE_PLAYS;
                dailyPlaysDate = todayStr;
                localStorage.setItem('subwayPlaysDate', todayStr);
                localStorage.setItem('subwayPlaysRemaining', dailyPlaysRemaining);
            } else {
                dailyPlaysRemaining = parseInt(localStorage.getItem('subwayPlaysRemaining') || DAILY_FREE_PLAYS);
            }

            const SHOP_ITEMS = [
                { id: 'headStart', name: '🚀 抢先起步', desc: '开局获得10秒全局加速', cost: 80, icon: '🚀' },
                { id: 'skate', name: '🛹 滑板', desc: '25%移速加成，持续8秒', cost: 120, icon: '🛹' },
                { id: 'magnet', name: '🧲 磁铁', desc: '自动吸附金币，持续5秒', cost: 100, icon: '🧲' },
                { id: 'jetpack', name: '🚀 喷气背包', desc: '50%移速加成+飞行，持续4秒', cost: 200, icon: '🚀' },
                { id: 'keys', name: '🔑 钥匙', desc: '1把钥匙=1次游戏次数', cost: 200, icon: '🔑' },
            ];
            // 道具效果激活状态（库存使用后生效）
            let activeInventoryEffect = null; // { type, timer }
            const INVENTORY_DURATIONS = { headStart: 10, skate: 8, magnet: 5, jetpack: 4 };

            const CHAR_PRESETS = [
                { id: 'boy', name: '男生', icon: '👦', body: '#3388ff', hat: '#dd3333', shoe: '#dd3333' },
                { id: 'girl', name: '女生', icon: '👧', body: '#ff66aa', hat: '#ff88cc', shoe: '#ff4488' },
                { id: 'robot', name: '机器人', icon: '🤖', body: '#aaaaaa', hat: '#666666', shoe: '#444444' },
                { id: 'alien', name: '外星人', icon: '👽', body: '#44cc44', hat: '#228822', shoe: '#116611' },
                { id: 'ninja', name: '忍者', icon: '🥷', body: '#222222', hat: '#111111', shoe: '#000000' },
            ];
            let selectedCharPreset = localStorage.getItem('subwayCharPreset') || 'boy';

            function savePersistentData() {
                localStorage.setItem('subwayTotalCoins', totalCoins);
                localStorage.setItem('subwayMaxDistance', maxDistance);
                localStorage.setItem('subwayInventory', JSON.stringify(inventory));
                localStorage.setItem('subwayChar', JSON.stringify(charConfig));
                localStorage.setItem('subwayCharPreset', selectedCharPreset);
                localStorage.setItem('subwayPlaysRemaining', dailyPlaysRemaining);
                localStorage.setItem('subwayPlaysDate', dailyPlaysDate);
            }

            function getTotalPlays() {
                return dailyPlaysRemaining + (inventory.keys || 0);
            }

            function consumePlay() {
                if (dailyPlaysRemaining > 0) { dailyPlaysRemaining--; }
                else if (inventory.keys > 0) { inventory.keys--; }
                savePersistentData();
            }

            function applyCharConfig() {
                const c = charConfig;
                if (playerBody && playerBody.material) playerBody.material.color.set(c.body);
                if (leftArm && leftArm.material) leftArm.material.color.set(c.body);
                if (rightArm && rightArm.material) rightArm.material.color.set(c.body);
                if (hat && hat.material) hat.material.color.set(c.hat);
                if (hatVisor && hatVisor.material) hatVisor.material.color.set(c.hat);
                if (leftShoe && leftShoe.material) leftShoe.material.color.set(c.shoe);
                if (rightShoe && rightShoe.material) rightShoe.material.color.set(c.shoe);
            }

            // 使用库存道具
            function useInventoryItem(type) {
                if (gameState !== GAME_STATES.PLAYING) return;
                if (!inventory[type] || inventory[type] <= 0) return;
                inventory[type]--;
                savePersistentData();
                updateInventoryPanel();
                // 激活道具效果
                activeInventoryEffect = { type, timer: INVENTORY_DURATIONS[type] };
                // 应用对应特效
                if (type === 'magnet') {
                    magnetRing.visible = true;
                } else if (type === 'jetpack') {
                    jetFlameGroup.visible = true;
                    if (!isJumping) { isJumping = true; verticalVelocity = 5; playerY = 1.5; }
                    isCrouching = false;
                } else if (type === 'skate') {
                    skateGroup.visible = true;
                    doubleJumpAvailable = true;
                }
                playSound('powerup');
                spawnFloatText(actualX, playerY + 2, playerGroup.position.z, '使用 ' + SHOP_ITEMS.find(i => i.id === type).name, '#00ff88');
            }

            // ==================== Three.js 初始化 ====================
            const container = document.getElementById('game-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.3, 200);
            camera.position.set(0, 3.5, -8);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowMap;
            // 关闭色调映射，减少GPU后处理开销
            renderer.toneMapping = THREE.NoToneMapping;
            container.appendChild(renderer.domElement);

            // 灯光
            const ambientLight = new THREE.AmbientLight(0x334455, 1.8);
            scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
            sunLight.position.set(10, 20, 5);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 256;
            sunLight.shadow.mapSize.height = 256;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 40;
            sunLight.shadow.camera.left = -8;
            sunLight.shadow.camera.right = 8;
            sunLight.shadow.camera.top = 8;
            sunLight.shadow.camera.bottom = -3;
            sunLight.shadow.bias = -0.0001;
            scene.add(sunLight);

            const pointLight1 = new THREE.PointLight(0xffcc88, 2.5, 16);
            pointLight1.position.set(0, 3, 5);
            scene.add(pointLight1);

            // 天空渐变
            function createSkyTexture(themeIdx) {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                const themes = [
                    ['#1a2a3a', '#2c4a6e', '#5a8ab5', '#aad0f0'],
                    ['#2a1a1a', '#5c3a2a', '#b87a50', '#f0c090'],
                    ['#0a0a1a', '#1a1a3a', '#2a2a5a', '#4a4a80'],
                    ['#1a2a1a', '#2a4a2a', '#4a7a3a', '#80b060'],
                ];
                const colors = themes[themeIdx % themes.length];
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, colors[0]);
                gradient.addColorStop(0.4, colors[1]);
                gradient.addColorStop(0.75, colors[2]);
                gradient.addColorStop(1, colors[3]);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                return new THREE.CanvasTexture(canvas);
            }
            let skyTexture = createSkyTexture(0);
            scene.background = skyTexture;
            scene.fog = new THREE.Fog(0x1a2a3a, 25, 80);

            // ==================== 音频系统 ====================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(type) {
                if (!audioCtx || isMuted) return;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const masterGain = ctx.createGain();
                masterGain.gain.value = globalGain;
                masterGain.connect(ctx.destination);

                switch (type) {
                    case 'coin': {
                        // 清脆双音“叮”声
                        [1200, 1600].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(freq, now + i * 0.03);
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(0.28, now + i * 0.03);
                            g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.03 + 0.11);
                            osc.connect(g); g.connect(masterGain);
                            osc.start(now + i * 0.03);
                            osc.stop(now + i * 0.03 + 0.11);
                        });
                        break;
                    }
                    case 'jump': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.linearRampToValueAtTime(600, now + 0.15);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.25, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                        osc.connect(g);
                        g.connect(masterGain);
                        osc.start(now);
                        osc.stop(now + 0.18);
                        break;
                    }
                    case 'crouch': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.linearRampToValueAtTime(150, now + 0.1);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.2, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                        osc.connect(g);
                        g.connect(masterGain);
                        osc.start(now);
                        osc.stop(now + 0.12);
                        break;
                    }
                    case 'powerup': {
                        [523, 659, 784].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            osc.type = 'triangle';
                            osc.frequency.setValueAtTime(freq, now + i * 0.04);
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(0.22, now + i * 0.04);
                            g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                            osc.connect(g);
                            g.connect(masterGain);
                            osc.start(now + i * 0.04);
                            osc.stop(now + 0.28);
                        });
                        break;
                    }
                    case 'train': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.linearRampToValueAtTime(100, now + 0.5);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.3, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
                        osc.connect(g);
                        g.connect(masterGain);
                        osc.start(now);
                        osc.stop(now + 0.55);
                        break;
                    }
                    case 'crash': {
                        const bufferSize = ctx.sampleRate * 0.25;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.06));
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.5, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                        noise.connect(g);
                        g.connect(masterGain);
                        noise.start(now);
                        const osc2 = ctx.createOscillator();
                        osc2.type = 'sine';
                        osc2.frequency.setValueAtTime(60, now);
                        const g2 = ctx.createGain();
                        g2.gain.setValueAtTime(0.4, now);
                        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                        osc2.connect(g2);
                        g2.connect(masterGain);
                        osc2.start(now);
                        osc2.stop(now + 0.35);
                        break;
                    }
                    case 'gameover': {
                        [440, 392, 349, 311, 261].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(freq, now + i * 0.15);
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(0.3, now + i * 0.15);
                            g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.2);
                            osc.connect(g);
                            g.connect(masterGain);
                            osc.start(now + i * 0.15);
                            osc.stop(now + i * 0.15 + 0.2);
                        });
                        break;
                    }
                    case 'click': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(1000, now);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.15, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                        osc.connect(g);
                        g.connect(masterGain);
                        osc.start(now);
                        osc.stop(now + 0.03);
                        break;
                    }
                }
                setTimeout(() => { masterGain.disconnect(); }, 600);
            }

            function startBgMusic() {
                stopBgMusic();
                if (!audioCtx || isMuted) return;
                bgMusicBPM = Math.round(120 + (speed - BASE_SPEED) * 5);
                const beatInterval = 60000 / bgMusicBPM / 2;
                const notes = [262, 294, 330, 349, 392, 349, 330, 294, 262, 330, 392, 440, 392, 330, 294, 262];
                bgMusicNoteIndex = 0;

                function playNote() {
                    if (gameState !== GAME_STATES.PLAYING || isMuted || !audioCtx) return;
                    const ctx = audioCtx;
                    const now = ctx.currentTime;
                    const freq = notes[bgMusicNoteIndex % notes.length];
                    const osc = ctx.createOscillator();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freq, now);
                    const g = ctx.createGain();
                    g.gain.setValueAtTime(0.06 * globalGain, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + beatInterval / 1000 * 0.7);
                    osc.connect(g);
                    g.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + beatInterval / 1000 * 0.8);
                    bgMusicNodes.push({ osc, g });
                    bgMusicNoteIndex++;
                }
                playNote();
                bgMusicInterval = setInterval(() => {
                    if (gameState === GAME_STATES.PLAYING && !isMuted && audioCtx) {
                        bgMusicBPM = Math.round(120 + (speed - BASE_SPEED) * 5);
                        const newInterval = 60000 / bgMusicBPM / 2;
                        playNote();
                    }
                    bgMusicNodes = bgMusicNodes.filter(n => {
                        try { return n.osc.playbackState !== 'finished'; } catch (
                        e) { return false; }
                    });
                }, beatInterval);
            }

            function stopBgMusic() {
                if (bgMusicInterval) clearInterval(bgMusicInterval);
                bgMusicInterval = null;
                bgMusicNodes.forEach(n => {
                    try { n.osc.stop(); } catch (e) {}
                    try { n.g.disconnect(); } catch (e) {}
                });
                bgMusicNodes = [];
            }

            function updateBgMusicBPM() {
                if (bgMusicInterval && gameState === GAME_STATES.PLAYING && !isMuted) {
                    const newBPM = Math.round(120 + (speed - BASE_SPEED) * 5);
                    if (Math.abs(newBPM - bgMusicBPM) >= 3) {
                        stopBgMusic();
                        startBgMusic();
                    }
                }
            }

            // ==================== 玩家模型 ====================
            const playerGroup = new THREE.Group();
            // 身体（上衣 — 亮蓝色连帽衫）
            const playerBody = new THREE.Mesh(
                new THREE.BoxGeometry(0.55, 0.7, 0.38),
                new THREE.MeshStandardMaterial({ color: 0x3388ff, roughness: 0.3, metalness: 0.08 })
            );
            playerBody.position.y = 0.58;
            playerBody.castShadow = true;
            playerBody.name = 'body';
            playerGroup.add(playerBody);

            // 裤子
            const pants = new THREE.Mesh(
                new THREE.BoxGeometry(0.52, 0.3, 0.36),
                new THREE.MeshStandardMaterial({ color: 0x224488, roughness: 0.4, metalness: 0.05 })
            );
            pants.position.y = 0.23;
            pants.castShadow = true;
            playerGroup.add(pants);

            // 头部
            const playerHead = new THREE.Mesh(
                new THREE.SphereGeometry(0.22, 16, 12),
                new THREE.MeshStandardMaterial({ color: 0xffd5b8, roughness: 0.5, metalness: 0.05 })
            );
            playerHead.position.y = 1.08;
            playerHead.castShadow = true;
            playerGroup.add(playerHead);

            // 帽子（红色鸭舌帽）
            const hat = new THREE.Mesh(
                new THREE.CylinderGeometry(0.18, 0.2, 0.1, 16),
                new THREE.MeshStandardMaterial({ color: 0xdd3333, roughness: 0.3, metalness: 0.2 })
            );
            hat.position.y = 1.22;
            hat.castShadow = true;
            playerGroup.add(hat);
            const hatVisor = new THREE.Mesh(
                new THREE.BoxGeometry(0.22, 0.04, 0.14),
                new THREE.MeshStandardMaterial({ color: 0xdd3333, roughness: 0.25, metalness: 0.15 })
            );
            hatVisor.position.set(0, 1.18, 0.16);
            playerGroup.add(hatVisor);

            // 手臂
            const leftArm = new THREE.Mesh(
                new THREE.CylinderGeometry(0.07, 0.06, 0.5, 8),
                new THREE.MeshStandardMaterial({ color: 0x3388ff, roughness: 0.3, metalness: 0.08 })
            );
            leftArm.position.set(-0.36, 0.65, 0);
            leftArm.castShadow = true;
            leftArm.name = 'leftArm';
            playerGroup.add(leftArm);
            const rightArm = new THREE.Mesh(
                new THREE.CylinderGeometry(0.07, 0.06, 0.5, 8),
                new THREE.MeshStandardMaterial({ color: 0x3388ff, roughness: 0.3, metalness: 0.08 })
            );
            rightArm.position.set(0.36, 0.65, 0);
            rightArm.castShadow = true;
            rightArm.name = 'rightArm';
            playerGroup.add(rightArm);

            // 腿（加长至0.7以增强跑步动态）
            const leftLeg = new THREE.Mesh(
                new THREE.CylinderGeometry(0.09, 0.08, 0.7, 8),
                new THREE.MeshStandardMaterial({ color: 0x224488, roughness: 0.4, metalness: 0.05 })
            );
            leftLeg.position.set(-0.15, 0.25, 0);
            leftLeg.castShadow = true;
            leftLeg.name = 'leftLeg';
            playerGroup.add(leftLeg);
            const rightLeg = new THREE.Mesh(
                new THREE.CylinderGeometry(0.09, 0.08, 0.7, 8),
                new THREE.MeshStandardMaterial({ color: 0x224488, roughness: 0.4, metalness: 0.05 })
            );
            rightLeg.position.set(0.15, 0.25, 0);
            rightLeg.castShadow = true;
            rightLeg.name = 'rightLeg';
            playerGroup.add(rightLeg);

            // 鞋子（加大）
            const leftShoe = new THREE.Mesh(
                new THREE.BoxGeometry(0.14, 0.08, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xdd3333, roughness: 0.25, metalness: 0.1 })
            );
            leftShoe.position.set(-0.15, -0.05, 0.06);
            leftShoe.castShadow = true;
            playerGroup.add(leftShoe);
            const rightShoe = new THREE.Mesh(
                new THREE.BoxGeometry(0.14, 0.08, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xdd3333, roughness: 0.25, metalness: 0.1 })
            );
            rightShoe.position.set(0.15, -0.05, 0.06);
            rightShoe.castShadow = true;
            playerGroup.add(rightShoe);

            // 背包
            const backpack = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.4, 0.2),

            // ==================== 轨道系统 ====================
            const trackMaterials = [];

            function getThemeColors(themeIdx) {
                const themes = [
                    { wall: 0x556677, rail: 0x888888, accent: 0xff8844, fog: 0x1a2a3a, sky: 0 },
                    { wall: 0x6b4a3a, rail: 0x999999, accent: 0xffaa55, fog: 0x2a1a1a, sky: 1 },
                    { wall: 0x334466, rail: 0x777788, accent: 0x44aaff, fog: 0x0a0a1a, sky: 2 },
                    { wall: 0x445533, rail: 0x8a8a8a, accent: 0x88cc44, fog: 0x1a2a1a, sky: 3 },
                ];
                return themes[themeIdx % themes.length];
            }

            function createTrackSegment(startZ, endZ, themeIdx) {
                const segment = new THREE.Group();
                const length = endZ - startZ;
                const midZ = (startZ + endZ) / 2;
                const colors = getThemeColors(themeIdx);
                // 计算斜坡高度：采样段内多个点取平均
                const samples = 10;
                let avgGroundY = 0;
                for (let si = 0; si < samples; si++) {
                    avgGroundY += getGroundHeight(startZ + (endZ - startZ) * si / (samples - 1));
                }
                avgGroundY /= samples;

                // 地面 - 跟随地形高度
                const groundThickness = 0.15 + avgGroundY;
                const ground = new THREE.Mesh(
                    new THREE.BoxGeometry(7, groundThickness, length),
                    new THREE.MeshStandardMaterial({ color: avgGroundY > 0.5 ? 0x5a5040 : 0x4a4535, roughness: 0.8, metalness: 0.1 })
                );
                ground.position.set(0, -0.075 + avgGroundY / 2, midZ);
                ground.receiveShadow = true;
                segment.add(ground);

                // 三条清晰双铁轨（每轨左右双钢轨，取消内层轨枕以降低draw call）
                const railGauge = 0.28;
                [-1.5, 0, 1.5].forEach(laneX => {
                    // 轨道碎石路基
                    const railBed = new THREE.Mesh(
                        new THREE.BoxGeometry(1.0, 0.04, length),
                        new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9, metalness: 0.05 })
                    );
                    railBed.position.set(laneX, -0.02 + avgGroundY, midZ);
                    railBed.receiveShadow = true;
                    segment.add(railBed);
                    // 双钢轨
                    [-railGauge, railGauge].forEach(offset => {
                        const rail = new THREE.Mesh(
                            new THREE.BoxGeometry(0.08, 0.06, length),
                            new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.12, metalness: 0.92 })
                        );
                        rail.position.set(laneX + offset, 0.04 + avgGroundY, midZ);
                        rail.receiveShadow = true;
                        segment.add(rail);
                    });
                });

                // 跨轨大枕木（低频，减少mesh数）
                for (let z = startZ; z < endZ; z += 4.5) {
                    const sleeper = new THREE.Mesh(
                        new THREE.BoxGeometry(4.8, 0.05, 0.14),
                        new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.55, metalness: 0.1 })
                    );
                    sleeper.position.set(0, 0.02 + avgGroundY, z);
                    sleeper.receiveShadow = true;
                    segment.add(sleeper);
                }

                // 两侧墙壁
                [-3.5, 3.5].forEach(x => {
                    const wall = new THREE.Mesh(
                        new THREE.BoxGeometry(0.3, 2.5, length),
                        new THREE.MeshStandardMaterial({ color: colors.wall, roughness: 0.5,
                            metalness: 0.2 })
                    );
                    wall.position.set(x, 1.25 + avgGroundY, midZ);
                    wall.receiveShadow = true;
                    wall.castShadow = true;
                    segment.add(wall);
                });

                // 精简信号灯（仅轨道旁小灯，降低视觉密度）
                for (let z = startZ + 6; z < endZ - 6; z += 18) {
                    const signalLight = new THREE.Mesh(
                        new THREE.BoxGeometry(0.1, 0.1, 0.1),
                        new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.1,
                            metalness: 0.1, emissive: 0xff0000, emissiveIntensity: 0.7 })
                    );
                    signalLight.position.set(0, 0.2 + avgGroundY, z);
                    segment.add(signalLight);
                }

                // 坡道+火车顶场景：在对应z区间生成梯子/平台
                const rampCycle = 800;
                const segStartCycle = ((startZ % rampCycle) + rampCycle) % rampCycle;
                const segEndCycle = ((endZ % rampCycle) + rampCycle) % rampCycle;
                // 上坡梯子（600-630区间）
                if (segStartCycle < 630 && segEndCycle > 600) {
                    const rStart = Math.max(startZ, Math.floor(startZ / rampCycle) * rampCycle + 600);
                    const rEnd = Math.min(endZ, Math.floor(startZ / rampCycle) * rampCycle + 630);
                    const stepCount = 10;
                    for (let si = 0; si < stepCount; si++) {
                        const stepZ = rStart + (rEnd - rStart) * si / stepCount;
                        const stepH = ((stepZ - rStart) / (rEnd - rStart)) * 3.5;
                        if (stepZ >= startZ && stepZ <= endZ) {
                            const step = new THREE.Mesh(
                                new THREE.BoxGeometry(4.0, 0.15, 0.5),
                                new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.4, metalness: 0.3 })
                            );
                            step.position.set(0, stepH, stepZ - midZ);
                            step.receiveShadow = true; step.castShadow = true;
                            segment.add(step);
                        }
                    }
                }
                // 火车顶平台（630-730区间）
                if ((segStartCycle < 730 && segStartCycle >= 630) || (segEndCycle > 630 && segEndCycle <= 730) ||
                    (segStartCycle < 630 && segEndCycle > 730)) {
                    const pStart = Math.max(startZ, Math.floor(startZ / rampCycle) * rampCycle + 630);
                    const pEnd = Math.min(endZ, Math.floor(startZ / rampCycle) * rampCycle + 730);
                    if (pEnd > pStart) {
                        const platLen = pEnd - pStart;
                        const platMid = (pStart + pEnd) / 2;
                        // 平台主体
                        const platform = new THREE.Mesh(
                            new THREE.BoxGeometry(4.5, 0.3, platLen),
                            new THREE.MeshStandardMaterial({ color: 0x556677, roughness: 0.3, metalness: 0.5 })
                        );
                        platform.position.set(0, 3.5, platMid - midZ);
                        platform.receiveShadow = true; platform.castShadow = true;
                        segment.add(platform);
                        // 平台围栏
                        [-2.2, 2.2].forEach(fx => {
                            const fence = new THREE.Mesh(
                                new THREE.BoxGeometry(0.1, 0.6, platLen),
                                new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.6 })
                            );
                            fence.position.set(fx, 3.8, platMid - midZ);
                            segment.add(fence);
                        });
                    }
                }

                segment.position.y = 0;
                return segment;
            }

            // 坡道+火车顶地面高度查询
            function getGroundHeight(z) {
                const rampCycle = 800; // 每800单位一个坡道周期
                const cycleZ = ((z % rampCycle) + rampCycle) % rampCycle;
                // 前600单位：平地
                if (cycleZ < 600) return 0;
                // 600-630：上坡（从0升到3.5）
                if (cycleZ < 630) return (cycleZ - 600) / 30 * 3.5;
                // 630-730：火车顶平台
                if (cycleZ < 730) return 3.5;
                // 730-760：下坡回落
                if (cycleZ < 760) return 3.5 - (cycleZ - 730) / 30 * 3.5;
                return 0;
            }

            function ensureTrackSegments(playerZ) {
                const segLength = 24;
                let needSegments = [];
                const minZ = playerZ - 15;
                const maxZ = playerZ + 35;

                // 检查需要哪些段
                let checkZ = Math.floor(minZ / segLength) * segLength;
                while (checkZ < maxZ) {
                    const exists = trackSegments.some(s => Math.abs(s.startZ - checkZ) < 1);
                    if (!exists) {
                        needSegments.push({ startZ: checkZ, endZ: checkZ + segLength });
                    }
                    checkZ += segLength;
                }

                // 创建需要的段
                needSegments.forEach(ns => {
                    const seg = createTrackSegment(ns.startZ, ns.endZ, currentTheme);
                    seg.userData = { startZ: ns.startZ, endZ: ns.endZ };
                    scene.add(seg);
                    trackSegments.push(seg);
                });

                // 移除落后太多的段
                for (let i = trackSegments.length - 1; i >= 0; i--) {
                    const seg = trackSegments[i];
                    if (seg.userData.endZ < playerZ - 20) {
                        scene.remove(seg);
                        disposeGroup(seg);
                        trackSegments.splice(i, 1);
                    }
                }
            }

            function disposeGroup(group) {
                group.traverse(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(m => m.dispose());
                        } else {
                            child.material.dispose();
                        }
                    }
                });
            }

                mesh.castShadow = true;
                group.add(mesh);
                group.position.set(x, getGroundHeight(z), z);
                group.userData = { type: 'powerup', powerType: powerType, x: x, z: z, baseY: 0.45, floatPhase: Math.random() *
                        Math.PI * 2 };
                scene.add(group);
                worldItems.push(group);
                return group;
            }

            function spawnWorldItem(playerZ) {
                const minZ = playerZ + 15;
                const maxZ = playerZ + 28;
                const z = minZ + Math.random() * (maxZ - minZ);
                const gY = getGroundHeight(z); // 地形抬高量
                const lanes = [-1.5, 0, 1.5];
                const numItems = 2 + Math.floor(Math.random() * 3);

                const usedLanes = new Set();
                for (let i = 0; i < numItems; i++) {
                    const availableLanes = lanes.filter(l => !usedLanes.has(l));
                    if (availableLanes.length === 0) break;
                    const lane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
                    usedLanes.add(lane);

                    const rand = Math.random();
                    if (rand < 0.55) {
                        // 金币（55%），大幅提升密度。其中30%生成弧形金币路径
                        if (Math.random() < 0.30) {
                            createCoinArc(lane, z);
                        } else {
                            // 生成密集金币串（3-5枚）
                            const coinCount = 3 + Math.floor(Math.random() * 3);
                            for (let ci = 0; ci < coinCount; ci++) {
                                createCoin(lane, z + ci * 0.6 + (Math.random() - 0.5) * 0.3, 0.55);
                            }
                        }
                    } else if (rand < 0.70) {
                        // 列车（15%）
                        const hasTop = Math.random() < 0.35;
                        createTrain(lane, z, hasTop);
                        if (hasTop && Math.random() < 0.4 && availableLanes.length > 1) {
                            const otherLanes = lanes.filter(l => l !== lane);
                            const ol = otherLanes[Math.floor(Math.random() * otherLanes.length)];
                            if (!usedLanes.has(ol)) { usedLanes.add(ol); createLowObstacle(ol, z + 1.2); }
                        }
                    } else if (rand < 0.80) {
                        createHighObstacle(lane, z);
                    } else if (rand < 0.88) {
                        createLowObstacle(lane, z);
                    } else if (rand < 0.93) {
                        createHurdle(lane, z);
                    } else {
                        const powerTypes = ['magnet', 'doubleScore', 'jetpack', 'skate'];
                        const pt2 = powerTypes[Math.floor(Math.random() * powerTypes.length)];
                        createPowerUp(lane, z, pt2);
                    }
                }
            }

            // ==================== 警察模型 ====================

                group.add(head);

                const cap = new THREE.Mesh(

                cap.position.y = 1.3;
                group.add(cap);
                const capVisor = new THREE.Mesh(
