            // ==================== 粒子系统 ====================
            // 预创建粒子几何体（复用，避免每帧创建/销毁）
            const particleGeom = new THREE.BoxGeometry(0.06, 0.06, 0.06);
            const particleMatCache = {};
            function getParticleMat(color) {
                if (!particleMatCache[color]) {
                    particleMatCache[color] = new THREE.MeshStandardMaterial({ color, roughness: 0.1, metalness: 0.3,
                        emissive: color, emissiveIntensity: 0.8, transparent: true });
                }
                return particleMatCache[color];
            }

            function spawnParticles(x, y, z, color, count = 8) {
                const mat = getParticleMat(color);
                for (let i = 0; i < count; i++) {
                    const particle = new THREE.Mesh(particleGeom, mat);
                    particle.position.set(x, y, z);
                    particle.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 4,
                            Math.random() * 3 + 1,
                            (Math.random() - 0.5) * 4
                        ),
                        life: 0.4 + Math.random() * 0.3,
                        age: 0
                    };
                    scene.add(particle);
                    particles.push(particle);
                }
            }

            function updateParticles(deltaTime) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.userData.age += deltaTime;
                    if (p.userData.age >= p.userData.life) {
                        scene.remove(p);
                        // 不复用dispose：几何体/材质为共享实例
                        particles.splice(i, 1);
                    } else {
                        const progress = p.userData.age / p.userData.life;
                        p.position.x += p.userData.velocity.x * deltaTime;
                        p.position.y += p.userData.velocity.y * deltaTime;
                        p.position.z += p.userData.velocity.z * deltaTime;
                        p.userData.velocity.y -= 12 * deltaTime;
                        p.scale.setScalar(1 - progress);
                        p.material.opacity = 1 - progress;
                        p.material.transparent = true;
                    }
                }
            }

            // ==================== 浮动文字 ====================
            function spawnFloatText(x, y, z, text, color = '#FFD700') {
                const div = document.createElement('div');
                div.className = 'float-text';
                div.textContent = text;
                div.style.color = color;
                document.getElementById('ui-layer').appendChild(div);
                const floatData = { element: div, worldPos: new THREE.Vector3(x, y, z), age: 0, life: 0.8 };
                floatTexts.push(floatData);
                setTimeout(() => {
                    if (div.parentNode) div.remove();
                }, 850);
                return floatData;
            }

            function updateFloatTexts() {
                for (let i = floatTexts.length - 1; i >= 0; i--) {
                    const ft = floatTexts[i];
                    ft.age += 0.016;
                    if (ft.age >= ft.life || !ft.element.parentNode) {
                        if (ft.element.parentNode) ft.element.remove();
                        floatTexts.splice(i, 1);
                        continue;
                    }
                    const screenPos = ft.worldPos.clone().project(camera);
                    const sx = (screenPos.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
                    const sy = (-screenPos.y * 0.5 + 0.5) * renderer.domElement.clientHeight;
                    if (screenPos.z > 1) {
                        ft.element.style.display = 'none';
                    } else {
                        ft.element.style.display = 'block';
                        ft.element.style.left = sx + 'px';
                        ft.element.style.top = (sy - 40 * ft.age / ft.life) + 'px';
                    }
                }
            }

            // ==================== 碰撞检测 ====================
            function getPlayerAABB() {
                const px = actualX;
                const py = playerY;
                const pz = playerGroup.position.z;
                let height = playerCollisionBox.height;
                if (isCrouching) height = 0.6;
                const hw = playerCollisionBox.width / 2;
                const hd = playerCollisionBox.depth / 2;
                return {
                    minX: px - hw,
                    maxX: px + hw,
                    minY: py,
                    maxY: py + height,
                    minZ: pz - hd,
                    maxZ: pz + hd
                };
            }

            function getItemAABB(item) {
                const ud = item.userData;
                const ix = ud.x !== undefined ? ud.x : item.position.x;
                const iz = ud.z !== undefined ? ud.z : item.position.z;
                const iy = item.position.y;
                let hw, hh, hd;
                if (ud.type === 'coin') {
                    hw = 0.25;
                    hh = 0.3;
                    hd = 0.25;
                } else if (ud.type === 'highObstacle') {
                    hw = ud.width / 2 || 0.35;
                    hh = ud.height / 2 || 0.75;
                    hd = ud.depth / 2 || 0.35;
                } else if (ud.type === 'lowObstacle') {
                    hw = ud.width / 2 || 0.3;
                    hh = ud.height / 2 || 0.275;
                    hd = ud.depth / 2 || 0.3;
                } else if (ud.type === 'hurdle') {
                    hw = ud.width / 2 || 0.65;
                    hh = ud.height / 2 || 0.475;
                    hd = ud.depth / 2 || 0.13;
                } else if (ud.type === 'train') {
                    hw = ud.width / 2 || 0.85;
                    hh = ud.height / 2 || 0.7;
                    hd = ud.depth / 2 || 1.5;
                } else if (ud.type === 'powerup') {
                    hw = 0.25;
                    hh = 0.35;
                    hd = 0.25;
                } else {
                    hw = 0.3;
                    hh = 0.4;
                    hd = 0.3;
                }
                return {
                    minX: ix - hw,
                    maxX: ix + hw,
                    minY: iy,
                    maxY: iy + hh * 2,
                    minZ: iz - hd,
                    maxZ: iz + hd
                };
            }

            function aabbOverlap(a, b) {
                return (
                    a.minX < b.maxX && a.maxX > b.minX &&
                    a.minY < b.maxY && a.maxY > b.minY &&
                    a.minZ < b.maxZ && a.maxZ > b.minZ
                );
            }

            function checkCollisions() {
                const playerAABB = getPlayerAABB();
                const isInvincible = activePowerUps.jetpack && activePowerUps.jetpack > 0;

                for (const item of worldItems) {
                    if (item.userData.collected) continue;
                    const itemAABB = getItemAABB(item);
                    if (!aabbOverlap(playerAABB, itemAABB)) continue;

                    const ud = item.userData;
                    if (ud.type === 'coin') {
                        // 收集金币
                        const basePoints = 1;
                        const multiplier = (activePowerUps.doubleScore && activePowerUps.doubleScore > 0) ? 2 : 1;
                        const points = basePoints * multiplier;
                        score += points;
                        item.userData.collected = true;
                        spawnParticles(item.position.x, item.position.y, item.position.z, 0xffd700, 4);
                        spawnFloatText(item.position.x, item.position.y + 0.6, item.position.z, '+' + points);
                        playSound('coin');
                        // 连击
                        if (gameTime - lastCollectTime < 1.5) {
                            comboCount++;
                        } else {
                            comboCount = 1;
                        }
                        lastCollectTime = gameTime;
                        // 移除金币
                        scene.remove(item);
                        disposeGroup(item);
                        const idx = worldItems.indexOf(item);
                        if (idx >= 0) worldItems.splice(idx, 1);
                    } else if (ud.type === 'highObstacle') {
                        if (isInvincible) continue;
                        if (isJumping && playerY > ud.height - 0.15) {
                            // 跳跃越过
                            continue;
                        } else {
                            triggerGameOver();
                            return;
                        }
                    } else if (ud.type === 'lowObstacle') {
                        if (isInvincible) continue;
                        if (isCrouching) {
                            // 下蹲躲避
                            continue;
                        } else if (isJumping && playerY > ud.height + 0.1) {
                            continue;
                        } else {
                            triggerGameOver();
                            return;
                        }
                    } else if (ud.type === 'hurdle') {
                        if (isInvincible) continue;
                        // 跨栏：下蹲可通过，跳跃够高也可越过
                        if (isCrouching) {
                            continue;
                        } else if (isJumping && playerY > ud.height - 0.1) {
                            continue;
                        } else {
                            triggerGameOver();
                            return;
                        }
                    } else if (ud.type === 'train') {
                        if (isInvincible) continue;
                        // 列车必须换轨道，检查是否在同一轨道
                        const playerLaneX = currentLane * 1.5;
                        const trainLaneX = ud.x;
                        if (Math.abs(playerLaneX - trainLaneX) < 0.5) {
                            triggerGameOver();
                            return;
                        }
                    } else if (ud.type === 'powerup') {
                        // 拾取道具
                        const pt = ud.powerType;
                        applyPowerUp(pt);
                        spawnParticles(item.position.x, item.position.y, item.position.z, 0xffffff, 10);
                        spawnFloatText(item.position.x, item.position.y + 0.6, item.position.z,
                            pt === 'magnet' ? '🧲磁铁' : pt === 'doubleScore' ? '⭐双倍' : pt === 'jetpack' ? '🚀喷气' :
                            '🛹滑板');
                        playSound('powerup');
                        scene.remove(item);
                        disposeGroup(item);
                        const idx2 = worldItems.indexOf(item);
                        if (idx2 >= 0) worldItems.splice(idx2, 1);
                    }
                }

                // 磁铁吸附（大范围+高速+Y轴+近距离自动拾取）
                if (activePowerUps.magnet && activePowerUps.magnet > 0) {
                    const magRange = 7;
                    const autoCollectDist = 0.45;
                    for (const item of worldItems) {
                        if (item.userData.type === 'coin' && !item.userData.collected) {
                            const dx = actualX - item.position.x;
                            const dy = (playerY + 0.6) - item.position.y;
                            const dz = playerGroup.position.z - item.position.z;
                            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                            // 极近距离自动拾取（防止穿模漏检）
                            if (dist < autoCollectDist) {
                                item.userData.collected = true;
                                const basePoints = 1;
                                const multiplier = (activePowerUps.doubleScore && activePowerUps.doubleScore > 0) ? 2 : 1;
                                score += basePoints * multiplier;
                                spawnParticles(item.position.x, item.position.y, item.position.z, 0xffd700, 3);
                                spawnFloatText(item.position.x, item.position.y + 0.3, item.position.z, '+' + (basePoints * multiplier));
                                playSound('coin');
                                if (gameTime - lastCollectTime < 1.5) { comboCount++; } else { comboCount = 1; }
                                lastCollectTime = gameTime;
                                scene.remove(item);
                                disposeGroup(item);
                                const idx = worldItems.indexOf(item);
                                if (idx >= 0) worldItems.splice(idx, 1);
                                continue;
                            }
                            if (dist < magRange) {
                                const pullSpeed = 20;
                                const nx = dx / (dist + 0.01);
                                const ny = dy / (dist + 0.01);
                                const nz = dz / (dist + 0.01);
                                item.position.x += nx * pullSpeed * 0.016;
                                item.position.y += ny * pullSpeed * 0.016;
                                item.position.z += nz * pullSpeed * 0.016;
                                // 金币飞行拖尾粒子
                                if (dist < 3 && Math.random() < 0.3) {
                                    spawnParticles(item.position.x, item.position.y, item.position.z, 0x44aaff, 1);
                                }
                            }
                        }
                    }
                }
            }

            function applyPowerUp(type) {
                // 游戏内拾取道具：即时激活定时效果
                const durations = { magnet: 5, doubleScore: 8, jetpack: 4, skate: 8 };
                activePowerUps[type] = durations[type];
                if (type === 'skate') {
                    doubleJumpAvailable = true;
                    skateGroup.visible = true;
                }
                if (type === 'magnet') {
                    magnetRing.visible = true;
                }
                if (type === 'doubleScore') {
                    doubleGlow.visible = true;
                }
                if (type === 'jetpack') {
                    isJumping = true;
                    verticalVelocity = 0;
                    playerY = 2.5;
                    isCrouching = false;
                    jetFlameGroup.visible = true;
                }
            }

            function updatePowerUps(deltaTime) {
                // 处理游戏内拾取的道具（包括8秒滑板）
                for (const key in activePowerUps) {
                    if (activePowerUps[key] > 0) {
                        activePowerUps[key] -= deltaTime;
                        if (activePowerUps[key] <= 0) {
                            activePowerUps[key] = 0;
                            if (key === 'magnet') magnetRing.visible = false;
                            if (key === 'doubleScore') doubleGlow.visible = false;
                            if (key === 'skate') { skateGroup.visible = false; doubleJumpAvailable = false; }
                            if (key === 'jetpack') {
                                jetFlameGroup.visible = false;
                                if (playerY > 0.05) { verticalVelocity = -3; }
                            }
                        }
                    }
                }
                // 处理库存道具效果计时
                if (activeInventoryEffect) {
                    activeInventoryEffect.timer -= deltaTime;
                    if (activeInventoryEffect.timer <= 0) {
                        // 库存道具效果结束
                        const t = activeInventoryEffect.type;
                        if (t === 'magnet') magnetRing.visible = false;
                        if (t === 'jetpack') { jetFlameGroup.visible = false; if (playerY > 0.05) verticalVelocity = -3; }
                        if (t === 'skate') { skateGroup.visible = false; doubleJumpAvailable = false; }
                        activeInventoryEffect = null;
                    }
                }
                // 喷气飞行
                const jetActive = (activePowerUps.jetpack && activePowerUps.jetpack > 0) ||
                    (activeInventoryEffect && activeInventoryEffect.type === 'jetpack');
                if (jetActive) {
                    if (playerY > 2.0) playerY -= 0.8 * deltaTime;
                    if (playerY < 2.0) playerY = 2.0;
                    verticalVelocity = 0;
                    jetFlameGroup.visible = true;
                    jetFlameGroup.children.forEach(f => { f.scale.setScalar(0.8 + Math.random() * 0.4); });
                }
                // 磁铁光环旋转
                const magActive = (activePowerUps.magnet && activePowerUps.magnet > 0) ||
                    (activeInventoryEffect && activeInventoryEffect.type === 'magnet');
                if (magActive) {
                    magnetRing.visible = true;
                    magnetRing.rotation.z += 3 * deltaTime;
                    magnetRing.position.y = 0.8;
                }
                // 双倍光环
                if (activePowerUps.doubleScore && activePowerUps.doubleScore > 0) {
                    doubleGlow.rotation.z -= 2 * deltaTime;
                    doubleGlow.position.y = 0.8;
                }
                // 滑板
                if (!doubleJumpAvailable && activePowerUps.skate) {
                    delete activePowerUps.skate;
                    skateGroup.visible = false;
                }
            }

            function getEffectiveSpeed() {
                let s = speed;
                // 喷气背包：50%加速
                if ((activePowerUps.jetpack && activePowerUps.jetpack > 0) ||
                    (activeInventoryEffect && activeInventoryEffect.type === 'jetpack')) {
                    s *= 1.5;
                }
                // 滑板：25%加速
                if (activeInventoryEffect && activeInventoryEffect.type === 'skate') {
                    s *= 1.25;
                }
                return Math.min(s, MAX_SPEED);
            }

            // ==================== 游戏结束 ====================
            let isStaggered = false;
            let staggerTimer = 0;
            let isDying = false;
            let deathTimer = 0;

            // 游戏状态快照（用于复活，每1秒记录一次，保留15秒）
            let gameSnapshots = [];
            let snapshotTimer = 0;
            const SNAPSHOT_INTERVAL = 1.5;  // 每1.5秒一次快照（降低CPU开销）
            const MAX_SNAPSHOTS = 15;        // 保留约22秒历史(1.5s×15)

            function saveSnapshot() {
                const snap = {
                    score, distance, speed, comboCount, lastCollectTime, gameTime,
                    currentLane, actualX, playerY, isJumping, isCrouching,
                    verticalVelocity, hasDoubleJumped, doubleJumpAvailable,
                    activePowerUps: { ...activePowerUps },
                    activeInventoryEffect: activeInventoryEffect ? { ...activeInventoryEffect } : null,
                    headStartTimer, policeZ, policeActive, policeTimer, policeSpeed,
                    playerGroupZ: playerGroup.position.z,
                    currentTheme, lastThemeSwitchZ, spawnTimer, spawnInterval,
                    playerGroupScaleY: playerGroup.scale.y,
                    playerGroupRotX: playerGroup.rotation.x,
                    playerGroupRotZ: playerGroup.rotation.z,
                };
                gameSnapshots.push(snap);
                while (gameSnapshots.length > MAX_SNAPSHOTS) gameSnapshots.shift();
            }

            function revivePlayer() {
                if (getTotalPlays() < 5 || gameSnapshots.length === 0) return false;
                // 消耗5次游戏次数（优先扣免费次数，再扣钥匙库存）
                for (let i = 0; i < 5; i++) consumePlay();
                savePersistentData();
                // 恢复到约15秒前的快照（每1.5s一个快照，10个≈15秒）
                const rewindCount = Math.min(10, gameSnapshots.length - 1);
                const idx = Math.max(0, gameSnapshots.length - 1 - rewindCount);
                const s = gameSnapshots[idx];
                if (!s) return false;
                score = s.score; distance = s.distance; speed = s.speed;
                comboCount = s.comboCount; lastCollectTime = s.lastCollectTime; gameTime = s.gameTime;
                currentLane = s.currentLane; actualX = s.actualX; playerY = s.playerY;
                isJumping = s.isJumping; isCrouching = s.isCrouching;
                verticalVelocity = s.verticalVelocity; hasDoubleJumped = s.hasDoubleJumped;
                doubleJumpAvailable = s.doubleJumpAvailable;
                activePowerUps = { ...s.activePowerUps };
                activeInventoryEffect = s.activeInventoryEffect ? { ...s.activeInventoryEffect } : null;
                headStartTimer = s.headStartTimer;
                policeZ = s.policeZ; policeActive = s.policeActive;
                policeTimer = s.policeTimer; policeSpeed = s.policeSpeed;
                playerGroup.position.set(actualX, playerY, s.playerGroupZ);
                playerGroup.scale.set(1, s.playerGroupScaleY, 1);
                playerGroup.rotation.set(s.playerGroupRotX, 0, s.playerGroupRotZ);
                currentTheme = s.currentTheme; lastThemeSwitchZ = s.lastThemeSwitchZ;
                spawnTimer = s.spawnTimer; spawnInterval = s.spawnInterval;
                // 清除玩家前方10米所有障碍物（避免复活即撞）
                for (let i = worldItems.length - 1; i >= 0; i--) {
                    const item = worldItems[i];
                    const iz = item.userData.z !== undefined ? item.userData.z : item.position.z;
                    if (iz > playerGroup.position.z - 3 && iz < playerGroup.position.z + 12) {
                        scene.remove(item); disposeGroup(item); worldItems.splice(i, 1);
                    }
                }
                // 重建轨道段
                for (const seg of trackSegments) { scene.remove(seg); disposeGroup(seg); }
                trackSegments = [];
                ensureTrackSegments(playerGroup.position.z);
                // 重置警察位置（推到远处）+ 30秒复活保护
                policeActive = false; policeTimer = 0;
                policeZ = playerGroup.position.z - 20;
                if (police) police.position.z = policeZ;
                reviveProtectionTimer = 30;
                // 重置死亡状态
                isDying = false; deathTimer = 0; isStaggered = false; staggerTimer = 0;
                playerGroup.visible = true;
                // 恢复游戏
                gameState = GAME_STATES.PLAYING;
                document.getElementById('gameover-overlay').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('bottom-timer-bar').classList.add('hidden');
                updateMenuStats();
                updateInventoryPanel();
                updateHUD();
                if (!isMuted) startBgMusic();
                playSound('powerup');
                spawnFloatText(actualX, playerY + 2, playerGroup.position.z, '✨ 复活成功！', '#ffdd00');
                return true;
            }

                staggerTimer = 0.8;
                playSound('crash');
                playSound('gameover');
                stopBgMusic();

                playerGroup.rotation.x = -0.5;

                gameState = GAME_STATES.GAMEOVER;
                // 清除所有道具特效
                doubleJumpAvailable = false;

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('subwayHighScore', highScore);

                savePersistentData();
                updateBottomTimer();

            function updateHUD() {
                document.getElementById('hud-score').textContent = '💰 ' + score;
                document.getElementById('hud-distance').textContent = '📏 ' + Math.floor(distance) + 'm';
                const comboEl = document.getElementById('hud-combo');
                if (comboCount >= 2 && gameTime - lastCollectTime < 1.5) {
                    comboEl.textContent = '🔥 x' + comboCount;
                    comboEl.style.transform = 'scale(1.1)';
                    setTimeout(() => { comboEl.style.transform = 'scale(1)'; }, 100);
                } else if (gameTime - lastCollectTime >= 1.5) {
                    comboCount = 0;
                    comboEl.textContent = '';
                } else if (comboCount < 2) {
                    comboEl.textContent = '';
                }
                // 道具栏
                const slotsEl = document.getElementById('powerup-slots');
                let html = '';
                const powerInfo = [
                    { key: 'magnet', icon: '🧲', name: '磁铁', barClass: 'bar-magnet' },
                    { key: 'doubleScore', icon: '⭐', name: '双倍', barClass: 'bar-double' },
                    { key: 'jetpack', icon: '🚀', name: '喷气', barClass: 'bar-jetpack' },
                    { key: 'skate', icon: '🛹', name: '滑板', barClass: 'bar-skate' },
                ];
                for (const pi of powerInfo) {
                    if (activePowerUps[pi.key] && activePowerUps[pi.key] > 0) {
                        const maxDur = pi.key === 'skate' ? 9999 : (pi.key === 'magnet' ? 5 : pi.key === 'doubleScore' ? 8 : 4);
                        const pct = Math.min(100, (activePowerUps[pi.key] / maxDur) * 100);
                        html += `<div class="powerup-slot">
                <span class="icon">${pi.icon}</span>
                <div class="bar-bg"><div class="bar-fill ${pi.barClass}" style="width:${pct}%"></div></div>
              </div>`;
                    }
                }
                slotsEl.innerHTML = html;
            }

            // ==================== 输入处理 ====================
            const keys = {};
            window.addEventListener('keydown', (e) => {
                const gameKeys = ['a', 'd', 'w', 's', 'arrowleft', 'arrowright', 'arrowup', 'arrowdown', 'p', 'r', 'm', 'enter', ' '];
                const keyLower = e.key.toLowerCase();
                if (!gameKeys.includes(keyLower) && !gameKeys.includes(e.code?.toLowerCase())) return;
                e.preventDefault();
                // P/R/M/Enter/Space 处理
                if (keyLower === 'p' && (gameState === GAME_STATES.PLAYING || gameState === GAME_STATES.PAUSED)) { togglePause(); return; }
                if (keyLower === 'r' && gameState === GAME_STATES.GAMEOVER) { resetGame(); return; }
                if (keyLower === 'm' && gameState === GAME_STATES.GAMEOVER) { returnToMenu(); return; }
                if (gameState === GAME_STATES.MENU && (keyLower === 'enter' || keyLower === ' ')) { startGame(); return; }
                if (gameState !== GAME_STATES.PLAYING) return;
                // 即时响应：左右移动（A/←左移, D/→右移）
                if ((keyLower === 'a' || keyLower === 'arrowleft') && currentLane < 1) { currentLane++; return; }
                if ((keyLower === 'd' || keyLower === 'arrowright') && currentLane > -1) { currentLane--; return; }
                // 即时响应：跳跃
                if ((keyLower === 'w' || keyLower === 'arrowup') && !isCrouching) {
                    if (!isJumping) { isJumping = true; verticalVelocity = 9.5; hasDoubleJumped = false; playSound('jump'); }
                    else if (doubleJumpAvailable && !hasDoubleJumped && verticalVelocity < 2) { verticalVelocity = 8; hasDoubleJumped = true; playSound('jump'); }
                    return;
                }
                // 下蹲：依然用按键状态
                keys[keyLower] = true;
                keys[e.code] = true;
            });
            window.addEventListener('keyup', (e) => {
                const keyLower = e.key.toLowerCase();
                keys[keyLower] = false;
                keys[e.code] = false;
                // 松开下蹲键则取消下蹲
                if ((keyLower === 's' || keyLower === 'arrowdown') && gameState === GAME_STATES.PLAYING && isCrouching) {
                    isCrouching = false;
                }
            });

            function handleInput() {
                if (gameState !== GAME_STATES.PLAYING) return;
                // 下蹲状态检查
                if (keys['s'] || keys['arrowdown'] || keys['KeyS'] || keys['ArrowDown']) {
                    if (!isJumping && !isCrouching) { isCrouching = true; playSound('crouch'); }
                }
            }

            // 触摸控制（移动端）
            let touchStartX = 0, touchStartY = 0, touchActive = false;
            let touchLaneCooldown = 0; // 防连触发

            function addTouchListeners(el) {
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    initAudio();
                    if (gameState === GAME_STATES.MENU) { startGame(); return; }
                    if (e.touches.length === 1) {
                        touchStartX = e.touches[0].clientX;
                        touchStartY = e.touches[0].clientY;
                        touchActive = true;
                    }
                }, { passive: false });

                el.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (!touchActive || gameState !== GAME_STATES.PLAYING) return;
                    const dx = e.touches[0].clientX - touchStartX;
                    const dy = e.touches[0].clientY - touchStartY;
                    const absDx = Math.abs(dx), absDy = Math.abs(dy);
                    const threshold = 30;
                    // 优先判定水平/垂直
                    if (absDx > absDy && absDx > threshold && touchLaneCooldown <= 0) {
                        // 水平滑动切换轨道
                        if (dx > 0 && currentLane > -1) { currentLane--; touchLaneCooldown = 0.15; }
                        else if (dx < 0 && currentLane < 1) { currentLane++; touchLaneCooldown = 0.15; }
                        touchStartX = e.touches[0].clientX;
                        touchStartY = e.touches[0].clientY;
                    } else if (absDy > absDx && absDy > threshold) {
                        // 垂直滑动跳跃/下蹲
                        if (dy < 0 && !isCrouching) {
                            if (!isJumping) { isJumping = true; verticalVelocity = 9.5; hasDoubleJumped = false; playSound('jump'); }
                            else if (doubleJumpAvailable && !hasDoubleJumped && verticalVelocity < 2) { verticalVelocity = 8; hasDoubleJumped = true; playSound('jump'); }
                        } else if (dy > 0 && !isJumping && !isCrouching) {
                            isCrouching = true; playSound('crouch');
                        }
                        touchStartY = e.touches[0].clientY;
                    }
                }, { passive: false });

                el.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    touchActive = false;
                    if (isCrouching && gameState === GAME_STATES.PLAYING) { isCrouching = false; }
                }, { passive: false });
            }
            // 同时监听 canvas 和 ui-layer
            addTouchListeners(renderer.domElement);
            addTouchListeners(document.getElementById('ui-layer'));

            // ==================== UI 按钮 ====================
            function togglePause() {
                if (gameState === GAME_STATES.PLAYING) {
                    gameState = GAME_STATES.PAUSED;
                    document.getElementById('pause-overlay').classList.remove('hidden');
                    document.getElementById('hud').classList.add('hidden');
                    stopBgMusic();
                } else if (gameState === GAME_STATES.PAUSED) {
                    gameState = GAME_STATES.PLAYING;
                    document.getElementById('pause-overlay').classList.add('hidden');
                    document.getElementById('hud').classList.remove('hidden');
                    startBgMusic();
                }
                playSound('click');
            }

            function startGame() {

                if (getTotalPlays() <= 0) {
                    alert('🔑 游戏次数不足！\n\n今日免费次数已用完，请前往商城购买钥匙（200金币/把）。');

            document.getElementById('btn-revive-go').addEventListener('click', function() {

            document.getElementById('btn-volume').addEventListener('click', () => {

                document.getElementById('shop-balance').textContent = totalCoins;

                container.innerHTML = SHOP_ITEMS.map(item => {
                    return `<div class="shop-item">

            // ==================== 道具库存面板 ====================
            function updateInventoryPanel() {
                const panel = document.getElementById('inventory-panel');
                if (gameState !== GAME_STATES.PLAYING) { panel.classList.add('hidden'); return; }
                panel.classList.remove('hidden');
                const container = document.getElementById('inv-items');
                // 过滤掉钥匙（钥匙仅用于复活，非战斗中道具）
                const battleItems = SHOP_ITEMS.filter(item => item.id !== 'keys');
                container.innerHTML = battleItems.map(item => {
                    const count = inventory[item.id] || 0;
                    const emptyClass = count <= 0 ? ' empty' : '';
                    return `<div class="inv-item${emptyClass}" data-type="${item.id}">
                        <span class="inv-icon">${item.icon}</span>${item.name}
                        <span class="inv-count">${count}</span>
                    </div>`;
                }).join('');
                // 点击使用道具
                container.querySelectorAll('.inv-item:not(.empty)').forEach(el => {
                    el.addEventListener('click', () => {
                        useInventoryItem(el.dataset.type);
                    });
                });
            }

            // ==================== 底部道具计时条 ====================
            function updateBottomTimer() {
                const bar = document.getElementById('bottom-timer-bar');
                const items = document.getElementById('bottom-timer-items');
                let hasActive = false;
                let html = '';
                const powerInfo = [
                    { key: 'magnet', icon: '🧲', name: '磁铁', color: '#4dc9f6', max: 5 },
                    { key: 'doubleScore', icon: '⭐', name: '双倍', color: '#ffd700', max: 8 },
                    { key: 'jetpack', icon: '🚀', name: '喷气', color: '#ff6b6b', max: 4 },
                    { key: 'skate', icon: '🛹', name: '滑板', color: '#51cf66', max: 8 },
                ];
                for (const pi of powerInfo) {
                    if (activePowerUps[pi.key] && activePowerUps[pi.key] > 0) {
                        hasActive = true;
                        const pct = pi.key === 'skate' ? 100 : Math.min(100, (activePowerUps[pi.key] / pi.max) * 100);
                        html += `<div class="bottom-timer-item">
                            <span class="bt-icon">${pi.icon}</span>${pi.name}
                            <div class="bottom-timer-bar-bg"><div class="bottom-timer-bar-fill" style="width:${pct}%;background:${pi.color}"></div></div>
                            <span>${Math.ceil(activePowerUps[pi.key])}s</span>
                        </div>`;
                    }
                }
                // 库存激活效果
                if (activeInventoryEffect) {
                    hasActive = true;
                    const invItem = SHOP_ITEMS.find(i => i.id === activeInventoryEffect.type);
                    const colorMap = { headStart: '#ff8844', skate: '#51cf66', magnet: '#4dc9f6', jetpack: '#ff6b6b' };
                    const maxMap = { headStart: 10, skate: 8, magnet: 5, jetpack: 4 };
                    html += `<div class="bottom-timer-item">
                        <span class="bt-icon">${invItem.icon}</span>${invItem.name}(库存)
                        <div class="bottom-timer-bar-bg"><div class="bottom-timer-bar-fill" style="width:${(activeInventoryEffect.timer/maxMap[activeInventoryEffect.type])*100}%;background:${colorMap[activeInventoryEffect.type]}"></div></div>
                        <span>${Math.ceil(activeInventoryEffect.timer)}s</span>
                    </div>`;
                }
                items.innerHTML = html;
                if (hasActive && gameState === GAME_STATES.PLAYING) {
                    bar.classList.remove('hidden');
                } else {
                    bar.classList.add('hidden');
                }
            }

            // ==================== 窗口调整 ====================
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
                const isMobile = window.innerWidth <= 768;
                document.getElementById('mobile-hint').style.opacity = isMobile ? '0.6' : '0.35';
            });

            // ==================== 游戏循环 ====================
            let lastTime = performance.now();
            let cameraTargetPos = new THREE.Vector3(0, 3.5, -8);

            function update(deltaTime) {
                if (gameState !== GAME_STATES.PLAYING) return;
                deltaTime = Math.min(deltaTime, 0.1);
                gameTime += deltaTime;
                // 触屏冷却
                if (touchLaneCooldown > 0) touchLaneCooldown -= deltaTime;

                handleInput();

                // 快照保存（每1秒）
                snapshotTimer += deltaTime;
                if (snapshotTimer >= SNAPSHOT_INTERVAL) {
                    snapshotTimer -= SNAPSHOT_INTERVAL;
                    saveSnapshot();
                }

                // 更新速度
                const effSpeed = getEffectiveSpeed();
                const moveDist = effSpeed * deltaTime;
                playerGroup.position.z += moveDist;
                distance += moveDist;

                // 更新主题（仅更新天空/雾，旧轨道段自然淘汰，避免全量重建卡顿）
                const themeIdx = Math.floor(distance / 500);
                if (themeIdx !== currentTheme) {
                    currentTheme = themeIdx;
                    skyTexture = createSkyTexture(currentTheme);
                    scene.background = skyTexture;
                    const tc = getThemeColors(currentTheme);
                    scene.fog = new THREE.Fog(tc.fog, 25, 80);
                }

                // 更新轨道
                ensureTrackSegments(playerGroup.position.z);

                // 平滑X移动
                const targetX = currentLane * 1.5;
                const lerpFactor = isCrouching ? 0.15 : 0.35;
                actualX += (targetX - actualX) * lerpFactor;
                if (Math.abs(actualX - targetX) < 0.01) actualX = targetX;
                playerGroup.position.x = actualX;

                // 跳跃物理（适配斜坡地形）
                const gravity = -16;
                const groundY = getGroundHeight(playerGroup.position.z);
                if (isJumping) {
                    verticalVelocity += gravity * deltaTime;
                    playerY += verticalVelocity * deltaTime;
                    if (playerY <= groundY) {
                        playerY = groundY;
                        verticalVelocity = 0;
                        isJumping = false;
                        hasDoubleJumped = false;
                    }
                } else if (Math.abs(playerY - groundY) > 0.05) {
                    // 非跳跃时平滑跟随地形
                    playerY += (groundY - playerY) * 0.3;
                    if (Math.abs(playerY - groundY) < 0.02) playerY = groundY;
                }
                playerGroup.position.y = playerY;

                // 下蹲视觉
                if (isCrouching && !isJumping) {
                    playerGroup.scale.y += (0.5 - playerGroup.scale.y) * 0.3;
                    playerGroup.position.y = -0.3;
                } else if (!isJumping) {
                    playerGroup.scale.y += (1.0 - playerGroup.scale.y) * 0.3;
                    playerGroup.position.y = playerY;
                }

                // 奔跑动画（大幅度肢体摆动）
                const runCycle = gameTime * effSpeed * 2.0;
                const bounceAmount = 0.08;
                if (!isJumping) {
                    playerGroup.position.y += Math.abs(Math.sin(runCycle)) * bounceAmount;
                }
                // 手臂摆动（±45°）
                const armSwing = Math.sin(runCycle) * 0.85;
                if (leftArm && rightArm) {
                    leftArm.rotation.x = armSwing;
                    rightArm.rotation.x = -armSwing;
                }
                // 腿部摆动（±40°，幅度加大）
                const legSwing = Math.sin(runCycle) * 0.7;
                if (leftLeg && rightLeg) {
                    leftLeg.rotation.x = -legSwing;
                    rightLeg.rotation.x = legSwing;
                }
                // 跳跃倾斜
                if (isJumping) {
                    playerGroup.rotation.x += (-0.25 - playerGroup.rotation.x) * 0.2;
                } else {
                    playerGroup.rotation.x += (0 - playerGroup.rotation.x) * 0.3;
                }

                // 道具更新
                updatePowerUps(deltaTime);

                // 生成物品
                spawnTimer += deltaTime;
                const minInterval = 0.35;
                const maxInterval = 1.0;
                const distFactor = Math.min(distance / 2000, 1);
                spawnInterval = maxInterval - (maxInterval - minInterval) * distFactor;
                if (spawnTimer >= spawnInterval + Math.random() * 0.3) {
                    spawnTimer = 0;
                    spawnWorldItem(playerGroup.position.z);
                }
                // 喷气背包状态下额外生成空中金币（每0.6秒一批）
                if (activePowerUps.jetpack && activePowerUps.jetpack > 0) {
                    if (!window._jetCoinTimer) window._jetCoinTimer = 0;
                    window._jetCoinTimer += deltaTime;
                    if (window._jetCoinTimer > 0.6) {
                        window._jetCoinTimer = 0;
                        const jLane = [-1.5, 0, 1.5][Math.floor(Math.random() * 3)];
                        const jZ = playerGroup.position.z + 18 + Math.random() * 10;
                        // 空中弧形金币（喷气高度2.0附近）
                        const airCoins = [1.8, 2.1, 2.4, 2.1, 1.8];
                        const airZ = [0, 0.4, 0.8, 1.2, 1.6];
                        const jgY = getGroundHeight(jZ);
                        for (let ai = 0; ai < airCoins.length; ai++) {
                            createCoin(jLane, jZ + airZ[ai], airCoins[ai] + jgY);
                        }
                    }
                } else {
                    window._jetCoinTimer = 0;
                }

                // 移除远处物品
                for (let i = worldItems.length - 1; i >= 0; i--) {
                    const item = worldItems[i];
                    const iz = item.userData.z !== undefined ? item.userData.z : item.position.z;
                    if (iz < playerGroup.position.z - 8) {
                        scene.remove(item);
                        disposeGroup(item);
                        worldItems.splice(i, 1);
                    }
                }

                // 物品动画
                for (const item of worldItems) {
                    if (item.userData.type === 'coin' && !item.userData.collected) {
                        item.position.y = item.userData.baseY + Math.sin(gameTime * 6 + item.userData.floatPhase) * 0.15;
                        item.rotation.z += item.userData.rotSpeed * deltaTime;
                    }
                    if (item.userData.type === 'powerup') {
                        item.position.y = item.userData.baseY + Math.sin(gameTime * 4 + item.userData.floatPhase) * 0.2;
                        item.rotation.y += 1.5 * deltaTime;
                    }
                    if (item.userData.type === 'train') {
                        item.userData.flashTimer += deltaTime;
                        if (item.userData.flashTimer > 0.6) {
                            item.userData.flashTimer = 0;
                            const bodyMesh = item.children.find(c => c.name === 'trainBody');
                            if (bodyMesh && bodyMesh.material) {
                                bodyMesh.material.emissiveIntensity =
                                    bodyMesh.material.emissiveIntensity > 0.4 ? 0.15 : 0.55;
                            }
                        }
                    }
                }

                // 碰撞检测（死亡动画中跳过）
                if (!isDying) checkCollisions();
                if (isDying) {
                    deathTimer -= deltaTime;
                    staggerTimer -= deltaTime;
                    // 死亡动画：倒地旋转
                    playerGroup.rotation.z += (1.5 - playerGroup.rotation.z) * 0.15;
                    playerGroup.rotation.x += (-0.6 - playerGroup.rotation.x) * 0.15;
                    playerGroup.position.y += (-1.5 - playerGroup.position.y) * 0.1;
                    if (deathTimer <= 0) finishGameOver();
                    return;
                }
                // 受击硬直恢复
                if (isStaggered) {
                    staggerTimer -= deltaTime;
                    if (staggerTimer <= 0) { isStaggered = false; playerGroup.rotation.z = 0; }
                }
                if (gameState === GAME_STATES.GAMEOVER) return;

                // 复活保护倒计时
                if (reviveProtectionTimer > 0) reviveProtectionTimer -= deltaTime;
                // 警察追击（8秒后激活，速度与玩家基础速度持平）
                policeTimer += deltaTime;
                if (policeTimer >= 8 && !policeActive) {
                    policeActive = true;
                    policeZ = playerGroup.position.z - 12;
                    if (police) police.position.z = policeZ;
                }
                if (policeActive && police) {
                    const distToPlayer = playerGroup.position.z - policeZ;
                    // 复活保护期间：警察无法抓捕
                    if (reviveProtectionTimer > 0) {
                        // 警察保持在远处，不追捕
                        if (policeZ < playerGroup.position.z - 15) {
                            policeZ += BASE_SPEED * 0.6 * deltaTime; // 慢速跟随
                        }
                        police.position.z = policeZ;
                        police.position.y = 0;
                    } else {
                        // 正常追击：基础速度与玩家持平(BASE_SPEED)，距离近时略快
                        const chaseFactor = Math.max(1, 6 / Math.max(distToPlayer, 4));
                        policeSpeed = (BASE_SPEED + distance * 0.003) * chaseFactor;
                        policeSpeed = Math.min(policeSpeed, BASE_SPEED + 3);
                        policeZ += policeSpeed * deltaTime;
                        police.position.z = policeZ;
                    }
                    // 警笛红蓝灯闪烁
                    const sirenFreq = 6 + (1 / Math.max(distToPlayer, 2)) * 12;
                    const sirenPhase = Math.sin(gameTime * sirenFreq);
                    if (police.userData.redLight) police.userData.redLight.intensity = sirenPhase > 0 ? 4 : 0.2;
                    if (police.userData.blueLight) police.userData.blueLight.intensity = sirenPhase < 0 ? 4 : 0.2;
                    // 警察跑步动画
                    const pRun = gameTime * policeSpeed * 2.2;
                    const pArmSwing = Math.sin(pRun) * 0.85;
                    const pLegSwing = Math.sin(pRun) * 0.7;
                    if (police.userData.pLeftArm) police.userData.pLeftArm.rotation.x = pArmSwing;
                    if (police.userData.pRightArm) police.userData.pRightArm.rotation.x = -pArmSwing;
                    if (police.userData.pLeftLeg) police.userData.pLeftLeg.rotation.x = -pLegSwing;
                    if (police.userData.pRightLeg) police.userData.pRightLeg.rotation.x = pLegSwing;
                    police.position.y = Math.abs(Math.sin(pRun)) * 0.05;
                    // 接近警告音（节流）
                    sirenCooldown -= deltaTime;
                    if (distToPlayer < 5 && Math.abs(sirenPhase) > 0.9 && sirenCooldown <= 0) {
                        playSound('train');
                        sirenCooldown = 0.5;
                    }
                    // 屏幕震动（距离越近震动越大）
                    if (distToPlayer < 8) {
                        const shakeAmount = Math.max(0, (8 - distToPlayer) / 8) * 0.12;
                        camera.position.x += (Math.random() - 0.5) * shakeAmount;
                        camera.position.y += (Math.random() - 0.5) * shakeAmount * 0.5;
                    }
                    // 检查是否追上
                    if (policeZ >= playerGroup.position.z) {
                        triggerGameOver();
                        return;
                    }
                }

                // 抢先起步计时
                if (headStartTimer > 0) {
                    headStartTimer -= deltaTime;
                    if (headStartTimer <= 0) headStartTimer = 0;
                }
                // 速度提升
                let newSpeed = BASE_SPEED +
                    Math.floor(score / 50) * 0.3 +
                    Math.floor(distance / 200) * 0.2;
                if (headStartTimer > 0) newSpeed = Math.max(newSpeed, BASE_SPEED + 3);
                speed = Math.min(newSpeed, MAX_SPEED);
                updateBgMusicBPM();

                // 粒子更新
                updateParticles(deltaTime);

                // 浮动文字更新
                updateFloatTexts();

                // 限制物品总数（降低上限减少遍历开销）
                while (worldItems.length > 60) {
                    const oldest = worldItems[0];
                    scene.remove(oldest);
                    disposeGroup(oldest);
                    worldItems.shift();
                }
                while (particles.length > 25) {
                    const op = particles[0];
                    scene.remove(op);
                    op.geometry.dispose();
                    op.material.dispose();
                    particles.shift();
                }

                // 更新HUD + 底部计时条（计时条每0.3秒更新，降低DOM操作频率）
                updateHUD();
                if (!window._btThrottle) window._btThrottle = 0;
                window._btThrottle += deltaTime;
                if (window._btThrottle >= 0.3) { window._btThrottle = 0; updateBottomTimer(); }

                // 相机跟随
                const camTargetX = actualX * 0.5;
                const camTargetY = 3.5 + playerY;
                const camTargetZ = playerGroup.position.z - 8;
                cameraTargetPos.set(camTargetX, camTargetY, camTargetZ);
                camera.position.lerp(cameraTargetPos, 0.08);
                const lookTarget = new THREE.Vector3(actualX * 0.3, 1.0 + playerY, playerGroup.position.z + 2);
                camera.lookAt(lookTarget);

                // 更新动态灯光
                pointLight1.position.set(0, 3, playerGroup.position.z + 5);
            }

            function animate(timestamp) {
                requestAnimationFrame(animate);
                const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
                lastTime = timestamp;

                if (gameState === GAME_STATES.PLAYING) {
                    update(deltaTime);
                } else if (gameState === GAME_STATES.PAUSED || gameState === GAME_STATES.MENU) {
                    // 仅渲染，不更新逻辑
                    updateFloatTexts();
                }

                renderer.render(scene, camera);
            }

            // ==================== 初始化 ====================
            function init() {
                // 初始轨道
                ensureTrackSegments(0);
                // 创建警察
                police = createPolice();
                police.position.set(0, 0, policeZ);
                // 应用角色配置 + 显示统计
                applyCharConfig();
                updateMenuStats();
                // 移动端检测
                const isMobile = window.innerWidth <= 768;
                document.getElementById('mobile-hint').style.opacity = isMobile ? '0.6' : '0.35';
                if (isMobile) {
                    document.getElementById('mobile-hint').textContent = '👆 左滑切换轨道 | 右半屏上滑跳跃 / 下滑下蹲';
                }
                // 确保初始状态
                document.getElementById('menu-screen').classList.remove('hidden');
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('pause-overlay').classList.add('hidden');
                document.getElementById('gameover-overlay').classList.add('hidden');
                gameState = GAME_STATES.MENU;
                lastTime = performance.now();
                requestAnimationFrame(animate);
            }

            init();
            console.log('🚇 3D地铁跑酷已就绪！');
            console.log('🎮 键盘控制：A/D或←/→移动 | W/↑跳跃 | S/↓下蹲 | P暂停 | R重新开始');
            console.log('📱 移动端：左半屏滑动切换轨道 | 右半屏上滑跳跃/下滑下蹲');
            console.log('💡 提示：点击开始按钮以激活音频系统');
        })();
    </script>
</body>
</html>
